          <span class="side-tag">${flash.flipped ? 'Answer' : 'Question'}</span>
          <div class="content">${md(flash.flipped ? card.back : card.front)}</div>
          <div class="hint">${flash.flipped ? 'Tap to flip back' : 'Tap to reveal'}</div>
        </div>
        <div class="flash-actions">
          <button class="btn btn-lg btn-danger" data-action="flash-rate" data-rating="review">Again</button>
          <button class="btn btn-lg btn-primary" data-action="flash-rate" data-rating="known">Got it</button>
        </div>
        <div class="row-between" style="margin-top:0.6rem">
          <button class="btn btn-sm btn-ghost flash-skip" data-action="flash-skip">Skip card</button>
          <p class="flash-help"><kbd>Space</kbd> flip · <kbd>→</kbd> got it · <kbd>←</kbd> again</p>
        </div>`;
    }

    function flashcardTopics() {
      return Array.from(new Set(flashcards.map(c => c.topic))).sort();
    }

    /* ---------- Quiz ---------- */
    function quizPool() {
      const src = quiz.mode === 'mcq' ? mcqs : trueFalse;
      const filt = quiz.topic === 'All' ? src : src.filter(q => q.topic === quiz.topic);
      return filt.length ? filt : src;
    }

    function startQuiz(forceReset = false) {
      const pool = quizPool();
      const ids = quiz.reviewIds ? pool.filter(q => quiz.reviewIds.includes(q.id)).map(q => q.id) : pool.map(q => q.id);
      if (forceReset || quiz.order.length === 0 || quiz.order.some(id => !ids.includes(id))) {
        let shuffled = shuffle(ids);
        const len = state.quizLength || 'all';
        if (!quiz.reviewIds && len !== 'all') {
          const n = Number(len);
          if (Number.isFinite(n) && n > 0) shuffled = shuffled.slice(0, n);
        }
        quiz.order = shuffled;
        quiz.index = 0;
        quiz.answers = {};
        quiz.complete = false;
      }
    }

    function quizQuestions() {
      const src = quiz.mode === 'mcq' ? mcqs : trueFalse;
      return quiz.order.map(id => src.find(q => q.id === id)).filter(Boolean);
    }

    function renderQuiz() {
      startQuiz();
      const topics = ['All', ...quizTopics()];
      const questions = quizQuestions();
      const total = questions.length;
      const head = `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Self-test</span>
            <h1>Quiz</h1>
            <span class="meta">${quiz.mode === 'mcq' ? `${mcqs.length} multiple-choice questions` : `${trueFalse.length} true / false statements`}${quiz.topic !== 'All' ? ` · ${escapeHtml(quiz.topic)}` : ''}</span>
          </div>
        </div>`;
      if (!total) {
        return `${head}<div class="empty"><h2>No questions match your filter</h2><p>Pick a different topic to continue.</p></div>`;
      }
      const answered = Object.keys(quiz.answers).length;
      const score = Object.values(quiz.answers).filter(a => a.correct).length;
      const lengthOpts = ['10', '25', '50', '100', 'all'];
      const lengthVal = state.quizLength || 'all';
      const toolbar = `
        <div class="quiz-toolbar">
          <div class="mode-switch">
            <button data-action="quiz-mode" data-mode="mcq" class="${quiz.mode === 'mcq' ? 'active' : ''}">Multiple choice</button>
            <button data-action="quiz-mode" data-mode="tf"  class="${quiz.mode === 'tf'  ? 'active' : ''}">True / false</button>
          </div>
          <label class="field">Topic
            <select data-action="quiz-topic">
              ${topics.map(t => `<option ${quiz.topic === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
            </select>
          </label>
          <label class="field">Length
            <select data-action="quiz-length">
              ${lengthOpts.map(v => `<option value="${v}" ${lengthVal === v ? 'selected' : ''}>${v === 'all' ? 'All' : v} ${v === 'all' ? '' : 'Q'}</option>`).join('')}
            </select>
          </label>
          <span class="grow"></span>
          <div class="quiz-meta">
            <span class="lbl">${answered ? 'Score' : 'Questions'}</span>
            <span class="val">${answered ? `<span class="num">${score}</span> <span class="muted">/ ${answered}</span>` : `<span class="num">${total}</span>`}</span>
          </div>
        </div>`;
      if (quiz.complete || quiz.index >= total) return head + toolbar + renderQuizResults(questions);
      const q = questions[quiz.index];
      const ans = quiz.answers[q.id];
      const options = quiz.mode === 'mcq' ? q.options : ['True', 'False'];
      const correctIdx = quiz.mode === 'mcq' ? q.answer : (q.answer ? 0 : 1);
      const optionsHtml = options.map((opt, i) => {
        let cls = '';
        if (ans !== undefined) {
          if (i === correctIdx) cls = 'correct';
          else if (i === ans.selected) cls = 'wrong';
        }
        return `<button class="option ${cls}" data-action="quiz-answer" data-index="${i}" ${ans !== undefined ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
      }).join('');
      const progressPct = Math.round(((quiz.index + (ans !== undefined ? 1 : 0)) / total) * 100);
      const feedback = ans === undefined ? '' : `
        <div class="feedback ${ans.correct ? 'feedback-ok' : 'feedback-miss'}">
          <div class="verdict">${ans.correct ? 'Correct' : 'Not quite'}</div>
          <div>${md(q.explanation || '')}</div>
        </div>
        <div class="row-between" style="margin-top:1rem">
          <span class="muted small">Question ${quiz.index + 1} of ${total}</span>
          <button class="btn btn-primary btn-lg" data-action="quiz-next">${quiz.index + 1 === total ? 'See results' : 'Next question →'}</button>
        </div>`;
      const answeredCount = Object.keys(quiz.answers).length;
      return head + toolbar + `
        <article class="quiz-card">
          <div class="quiz-progress">
            <span class="progress-text">Question ${quiz.index + 1} of ${total}</span>
            <span class="topic-chip">${escapeHtml(q.topic)}</span>
          </div>
          <div class="progress-bar"><div class="fill" style="width:${progressPct}%"></div></div>
          <div class="question">${md(q.q)}</div>
          <div class="options">${optionsHtml}</div>
          ${feedback}
          ${total > 10 && answeredCount > 0 ? `<div class="row-between" style="margin-top:1.1rem;padding-top:0.85rem;border-top:1px dashed var(--border)"><span class="muted tiny">Long set — finish whenever you like</span><button class="btn btn-sm btn-ghost" data-action="quiz-end-now">End quiz now</button></div>` : ''}
        </article>`;
    }

    function renderQuizResults(questions) {
      const total = questions.length;
      const correct = Object.values(quiz.answers).filter(a => a.correct).length;
      const pct = total ? Math.round(correct / total * 100) : 0;
      const wrong = questions.filter(q => quiz.answers[q.id] && !quiz.answers[q.id].correct);
      const byTopic = {};
      questions.forEach(q => {
        const a = quiz.answers[q.id];
        byTopic[q.topic] ||= { c: 0, w: 0 };
        if (a?.correct) byTopic[q.topic].c++; else byTopic[q.topic].w++;
      });
      const message = pct >= 90 ? 'Excellent recall.' : pct >= 75 ? 'Solid. Review what slipped.' : pct >= 50 ? 'Steady progress — work on the misses.' : 'Plenty of room to grow. Review notes and retry.';
      return `
        <div class="results-block">
          <span class="eyebrow">Results</span>
          <div class="pct">${pct}%</div>
          <p class="meta">${correct} of ${total} correct · ${message}</p>
          <div class="results-grid">
            ${Object.entries(byTopic).map(([t, v]) => `
              <div class="results-row">
                <span>${escapeHtml(t)}</span>
                <span><span class="stat-correct">${v.c} correct</span> · <span class="stat-wrong">${v.w} missed</span></span>
              </div>
            `).join('')}
          </div>
          <div class="row-between" style="justify-content:center; gap:0.6rem">
            <button class="btn btn-primary btn-lg" data-action="quiz-retake">Retake</button>
            <button class="btn btn-lg" data-action="quiz-review-wrong" ${wrong.length ? '' : 'disabled'}>Review wrong (${wrong.length})</button>
          </div>
        </div>`;
    }

    function quizTopics() {
      const src = quiz.mode === 'mcq' ? mcqs : trueFalse;
      return Array.from(new Set(src.map(q => q.topic))).sort();
    }

    function recordMistake(q, userAnswer, correctAnswer) {
      const id = ++state.lastMistakeId;
      state.mistakes.unshift({
        id: `m${id}`,
        questionId: q.id,
        topic: q.topic || 'General',
        prompt: q.q || q.front || 'Question',
        userAnswer,
        correctAnswer,
        explanation: q.explanation || '',
        date: new Date().toISOString(),
        resolved: false
      });
      state.mistakes = state.mistakes.slice(0, 200);
      saveState();
    }

    /* ---------- Mistakes ---------- */
    function renderMistakes() {
      const list = (state.mistakes || []).filter(m => {
        if (!searchQuery) return true;
        return `${m.topic} ${m.prompt} ${m.userAnswer} ${m.correctAnswer} ${m.explanation}`.toLowerCase().includes(searchQuery.toLowerCase());
      });
      const open = list.filter(m => !m.resolved).length;
      const head = `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Wrong-answer log</span>
            <h1>Mistakes</h1>
            <span class="meta">${list.length ? `${open} open · ${list.length} total` : 'Empty for now'}</span>
          </div>
          <span class="grow"></span>
          <div class="actions">${list.length ? `<button class="btn btn-sm btn-ghost btn-danger" data-action="clear-mistakes">Clear all</button>` : ''}</div>
        </div>`;
      if (!list.length) {
        return `${head}
          <div class="empty">
            <span class="ic-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
            <h2>No mistakes saved yet</h2>
            <p>Take a quiz — every question you miss is logged here so you can revisit them.</p>
            <p style="margin-top:1.2rem"><button class="btn btn-primary" data-tab="quiz">Start a quiz</button></p>
          </div>`;
      }
      return `${head}
        ${list.map(m => `
          <div class="mistake ${m.resolved ? 'resolved' : ''}">
            <span class="topic">${escapeHtml(m.topic)}</span>
            <h3>${md(m.prompt)}</h3>
            <div class="answer-row">
              <div class="answer"><span class="label">Your answer</span>${md(m.userAnswer || '—')}</div>
              <div class="answer correct-ans"><span class="label">Correct answer</span>${md(m.correctAnswer || '—')}</div>
            </div>
            ${m.explanation ? `<div class="answer" style="margin-bottom:0.85rem"><span class="label">Why</span>${md(m.explanation)}</div>` : ''}
            <div class="actions">
              <button class="btn btn-sm ${m.resolved ? '' : 'btn-good'}" data-action="toggle-mistake" data-id="${escapeHtml(m.id)}">${m.resolved ? 'Reopen' : 'Mark resolved'}</button>
              <button class="btn btn-sm btn-ghost" data-action="delete-mistake" data-id="${escapeHtml(m.id)}">Delete</button>
            </div>
          </div>
        `).join('')}`;
    }

    /* ---------- Reference ---------- */
    function renderReference() {
      const aFilter = searchQuery.toLowerCase();
      const visAnom = !aFilter ? anomalies : anomalies.filter(a => `${a.anomaly} ${a.cause} ${a.features} ${a.syndrome} ${a.tag}`.toLowerCase().includes(aFilter));
      const visDeriv = !aFilter ? derivatives : derivatives.filter(r => r.join(' ').toLowerCase().includes(aFilter));
      const visMnem = !aFilter ? mnemonics : mnemonics.filter(m => `${m.phrase} ${m.stands} ${m.whyItWorks} ${m.topic}`.toLowerCase().includes(aFilter));
      return `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Quick-revision tables</span>
            <h1>Reference</h1>
            <span class="meta">High-yield charts for last-minute review</span>
          </div>
        </div>

        <section class="ref-section">
          <div class="ref-head">
            <h2>Embryonic → Adult derivatives</h2>
            <span class="meta">${visDeriv.length} pairs · tap to flip</span>
          </div>
          <div class="ref-grid">
            ${visDeriv.map(r => {
              const idx = derivatives.indexOf(r);
              return `
                <button class="ref-row" data-action="flip-derivative" data-index="${idx}">
                  <span><span class="col-label">Embryonic</span><strong>${escapeHtml(r[0])}</strong></span>
                  <span class="arrow" aria-hidden="true">→</span>
                  <span><span class="col-label">Adult</span><strong>${escapeHtml(r[1])}</strong></span>
                </button>`;
            }).join('') || `<p class="muted small">No matches.</p>`}
          </div>
        </section>

        <section class="ref-section">
          <div class="ref-head">
            <h2>Congenital anomalies</h2>
            <span class="meta">${visAnom.length} entries</span>
          </div>
          <div>
            ${visAnom.map(a => `
              <div class="anomaly-row">
                <div class="head">
                  <h3>${escapeHtml(a.anomaly)}</h3>
                  <span class="tag">${escapeHtml(a.tag)}</span>
                  ${a.syndrome && a.syndrome !== '—' ? `<span class="syndrome">${escapeHtml(a.syndrome)}</span>` : ''}
                </div>
                <div class="field"><span class="label">Cause</span><span>${md(a.cause)}</span></div>
                <div class="field"><span class="label">Features</span><span>${escapeHtml(a.features)}</span></div>
              </div>`).join('') || `<p class="muted small">No matches.</p>`}
          </div>
        </section>

        <section class="ref-section">
          <div class="ref-head">
            <h2>Mnemonics</h2>
            <span class="meta">${visMnem.length} memory aids</span>
          </div>
          <div>
            ${visMnem.map(m => `
              <div class="mnemonic">
                <span class="topic">${escapeHtml(m.topic)}</span>
                <div class="phrase">${md(m.phrase)}</div>
                <div class="stands">${md(m.stands)}</div>
                <div class="why">${escapeHtml(m.whyItWorks)}</div>
              </div>`).join('') || `<p class="muted small">No matches.</p>`}
          </div>
        </section>`;
    }

    /* ---------- Search overlay ---------- */
    function renderSearchResults() {
      if (!searchQuery) {
        searchResults.classList.add('hidden');
        searchResults.innerHTML = '';
        return;
      }
      const q = searchQuery.toLowerCase();
      const out = [];
      notes.forEach(s => { if (textOfSection(s).toLowerCase().includes(q)) out.push({ tab: 'notes', target: s.id, label: 'Note', title: s.title }); });
      flashcards.forEach(c => { if (`${c.topic} ${c.front} ${c.back}`.toLowerCase().includes(q)) out.push({ tab: 'flashcards', label: 'Flashcard', title: c.front }); });
      anomalies.forEach(a => { if (`${a.anomaly} ${a.cause} ${a.features}`.toLowerCase().includes(q)) out.push({ tab: 'reference', label: 'Anomaly', title: a.anomaly }); });
      derivatives.forEach(r => { if (r.join(' ').toLowerCase().includes(q)) out.push({ tab: 'reference', label: 'Derivative', title: `${r[0]} → ${r[1]}` }); });
      mnemonics.forEach(m => { if (`${m.phrase} ${m.stands} ${m.topic}`.toLowerCase().includes(q)) out.push({ tab: 'reference', label: 'Mnemonic', title: m.phrase }); });
      searchResults.classList.remove('hidden');
      searchResults.innerHTML = out.length
        ? out.slice(0, 14).map(r => `<button data-action="search-jump" data-tab="${r.tab}" data-target="${r.target || ''}"><span class="label">${r.label}</span><span class="title">${escapeHtml(r.title)}</span></button>`).join('')
        : `<div style="padding:0.6rem 0.75rem" class="muted small">No matches.</div>`;
    }

    /* ---------- Modal ---------- */
    function openModal(html) {
      modalRoot.innerHTML = `<div class="modal-bg" data-action="modal-bg"><div class="modal" role="dialog" aria-modal="true">${html}</div></div>`;
    }
    function closeModal() { modalRoot.innerHTML = ''; }

    /* ---------- Event delegation ---------- */
    document.addEventListener('click', e => {
      const tabBtn = e.target.closest('[data-tab]');
      if (tabBtn && !tabBtn.dataset.action) {
        switchTab(tabBtn.dataset.tab);
        searchResults.classList.add('hidden');
        return;
      }
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const a = el.dataset.action;

      if (a === 'jump-note') {
        const t = el.dataset.target;
        const targetEl = document.getElementById(t);
        if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      if (a === 'toggle-theme') {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        saveState(); render();
      }
      if (a === 'flash-flip') { flash.flipped = !flash.flipped; render(); }
      if (a === 'flash-rate') {
        const id = flash.queue[flash.index];
        if (id) {
          state.flashStatus[id] = el.dataset.rating;
          saveState();
        }
        flash.index++;
        flash.flipped = false;
        if (flash.index >= flash.queue.length) ensureFlashQueue(true);
        render();
      }
      if (a === 'flash-skip') {
        flash.index++;
        flash.flipped = false;
        if (flash.index >= flash.queue.length) ensureFlashQueue(true);
        render();
      }
      if (a === 'flash-shuffle') { ensureFlashQueue(true); render(); }
      if (a === 'flash-reset-confirm') {
        openModal(`
          <h2>Reset flashcard progress?</h2>
          <p class="muted small">This clears "Got it" / "Again" status for every card. Your notes, mistakes, and quiz history stay.</p>
          <div class="actions">
            <button class="btn" data-action="modal-close">Cancel</button>
            <button class="btn btn-primary" data-action="flash-reset-confirmed">Reset</button>
          </div>`);
      }
      if (a === 'flash-reset-confirmed') {
        state.flashStatus = {};
        saveState();
        ensureFlashQueue(true);
        closeModal();
        render();
      }
      if (a === 'modal-close' || a === 'modal-bg') {
        if (a === 'modal-bg' && e.target !== el) return; // only outer click
        closeModal();
      }
      if (a === 'quiz-mode') {
        quiz.mode = el.dataset.mode;
        quiz.order = []; quiz.index = 0; quiz.answers = {}; quiz.complete = false; quiz.reviewIds = null;
        render();
      }
      if (a === 'quiz-answer') {
        const questions = quizQuestions();
        const q = questions[quiz.index];
        const i = Number(el.dataset.index);
        const correctIdx = quiz.mode === 'mcq' ? q.answer : (q.answer ? 0 : 1);
        const correct = i === correctIdx;
        quiz.answers[q.id] = { selected: i, correct };
        if (!correct) {
          const options = quiz.mode === 'mcq' ? q.options : ['True', 'False'];
          recordMistake(q, options[i], options[correctIdx]);
        }
        render();
      }
      if (a === 'quiz-next') {
        const questions = quizQuestions();
        quiz.index++;
        if (quiz.index >= questions.length) quiz.complete = true;
        render();
      }
      if (a === 'quiz-end-now') {
        // Trim the order to questions actually answered, then mark complete.
        const answered = Object.keys(quiz.answers);
        quiz.order = quiz.order.filter(id => answered.includes(id));
        quiz.complete = true;
        render();
      }
      if (a === 'quiz-retake') {
        quiz.reviewIds = null;
        startQuiz(true);
        render();
      }
      if (a === 'quiz-review-wrong') {
        const questions = quizQuestions();
        const wrong = questions.filter(q => quiz.answers[q.id] && !quiz.answers[q.id].correct);
        quiz.reviewIds = wrong.map(q => q.id);
        startQuiz(true);
        render();
      }
      if (a === 'toggle-mistake') {
        const m = state.mistakes.find(x => x.id === el.dataset.id);
        if (m) { m.resolved = !m.resolved; saveState(); render(); }
      }
      if (a === 'delete-mistake') {
        state.mistakes = state.mistakes.filter(x => x.id !== el.dataset.id);
        saveState(); render();
      }
      if (a === 'clear-mistakes') {
        openModal(`
          <h2>Clear all mistakes?</h2>
          <p class="muted small">This removes every saved mistake from this app. You can take a quiz to start a fresh list.</p>
          <div class="actions">
            <button class="btn" data-action="modal-close">Cancel</button>
            <button class="btn btn-primary" data-action="clear-mistakes-confirmed">Clear all</button>
          </div>`);
      }
      if (a === 'clear-mistakes-confirmed') {
        state.mistakes = [];
        saveState(); closeModal(); render();
      }
      if (a === 'flip-derivative') {
        const idx = Number(el.dataset.index);
        const row = derivatives[idx];
        // Swap visually by mutating UI only (toggle dataset)
        const labels = el.querySelectorAll('.col-label');
        const values = el.querySelectorAll('strong');
        if (labels.length === 2 && values.length === 2) {
          [labels[0].textContent, labels[1].textContent] = [labels[1].textContent, labels[0].textContent];
          [values[0].textContent, values[1].textContent] = [values[1].textContent, values[0].textContent];
        }
      }
      if (a === 'search-jump') {
        switchTab(el.dataset.tab, { target: el.dataset.target });
        searchInput.value = '';
        searchQuery = '';
        searchResults.classList.add('hidden');
      }
    });

    document.addEventListener('change', e => {
      const t = e.target;
      if (t.matches('[data-action="toggle-read"]')) {
        const id = t.dataset.id;
        if (t.checked) {
          if (!state.readSections.includes(id)) state.readSections.push(id);
        } else {
          state.readSections = state.readSections.filter(x => x !== id);
        }
        saveState();
        // Update TOC marker + the toggle label without re-rendering the whole page.
        document.querySelectorAll(`.notes-toc button[data-target="${id}"]`).forEach(btn => btn.classList.toggle('read', t.checked));
        const toggleLabel = t.closest('.read-toggle');
        if (toggleLabel) {
          toggleLabel.classList.toggle('is-read', t.checked);
          const span = toggleLabel.querySelector('span:last-child');
          if (span) span.textContent = t.checked ? 'Read' : 'Mark as read';
        }
        const meta = document.querySelector('.page-head .heading-block .meta');
        if (meta) {
          const readCount = notes.filter(n => state.readSections.includes(n.id)).length;
          meta.textContent = `${readCount} of ${notes.length} sections read`;
        }
      }
      if (t.matches('[data-action="flash-topic"]')) {
        flash.topic = t.value;
        flash.queue = [];
        ensureFlashQueue(true);
        render();
      }
      if (t.matches('[data-action="quiz-topic"]')) {
        quiz.topic = t.value;
        quiz.order = []; quiz.index = 0; quiz.answers = {}; quiz.complete = false; quiz.reviewIds = null;
        render();
      }
      if (t.matches('[data-action="quiz-length"]')) {
        state.quizLength = t.value;
        saveState();
        quiz.order = []; quiz.index = 0; quiz.answers = {}; quiz.complete = false; quiz.reviewIds = null;
        render();
      }
    });

    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderSearchResults();
    });
    searchInput.addEventListener('focus', renderSearchResults);
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap') && !e.target.closest('#searchResults')) {
        searchResults.classList.add('hidden');
      }
    });

    themeToggle.addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      saveState(); render();
    });

    document.getElementById('brandHome')?.addEventListener('click', () => switchTab('notes'));

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); searchResults.classList.add('hidden'); searchInput.blur(); }
      const tag = document.activeElement?.tagName;
      const typing = ['INPUT', 'TEXTAREA', 'SELECT'].includes(tag);
      if (typing) return;
      if (activeTab === 'flashcards') {
        if (e.code === 'Space') { e.preventDefault(); flash.flipped = !flash.flipped; render(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); document.querySelector('[data-action="flash-rate"][data-rating="known"]')?.click(); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); document.querySelector('[data-action="flash-rate"][data-rating="review"]')?.click(); }
      }
    });

    render();

  </script>
</body>
</html>
