<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Minimalist study companion for Development of the Heart embryology." />
  <title>Heart Embryology — Study</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%239C1B2E' d='M32 56S6 41 4 22C2 8 19 3 32 18 45 3 62 8 60 22 58 41 32 56 32 56z'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;550;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #F8F6F2;
  --bg-grad: radial-gradient(1100px 540px at 80% -10%, rgba(159, 18, 57, 0.06), transparent 60%),
             radial-gradient(900px 480px at -10% 40%, rgba(122, 27, 60, 0.04), transparent 60%);
  --surface: #FFFFFF;
  --surface-2: #F2EFE9;
  --surface-3: #ECE7DD;
  --text: #1B1715;
  --muted: #6E655E;
  --muted-strong: #4D4540;
  --border: #E6E1D7;
  --border-strong: #CFC8B9;
  --accent: #8B1538;
  --accent-soft: #F8E6EA;
  --accent-hover: #6F0F2C;
  --gold: #B8893E;
  --good: #15734A;
  --good-soft: #E5F2EB;
  --warn: #A6500F;
  --warn-soft: #FBEFE0;
  --shadow-sm: 0 1px 2px rgba(28, 23, 21, 0.04), 0 1px 3px rgba(28, 23, 21, 0.04);
  --shadow-md: 0 1px 2px rgba(28, 23, 21, 0.05), 0 4px 12px rgba(28, 23, 21, 0.06);
  --shadow-lg: 0 1px 3px rgba(28, 23, 21, 0.06), 0 16px 40px -12px rgba(28, 23, 21, 0.14);
  --shadow-glow: 0 1px 0 rgba(255, 255, 255, 0.6) inset;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  color-scheme: light;
}
[data-theme="dark"] {
  --bg: #131113;
  --bg-grad: radial-gradient(1100px 540px at 80% -10%, rgba(255, 105, 130, 0.08), transparent 60%),
             radial-gradient(900px 480px at -10% 40%, rgba(184, 137, 62, 0.06), transparent 60%);
  --surface: #1C191B;
  --surface-2: #232023;
  --surface-3: #2C282B;
  --text: #F1ECE5;
  --muted: #9E948C;
  --muted-strong: #C2B8AF;
  --border: #2D292C;
  --border-strong: #3F3A3D;
  --accent: #F26B86;
  --accent-soft: rgba(242, 107, 134, 0.1);
  --accent-hover: #FF8AA0;
  --gold: #D9A94C;
  --good: #6BCB97;
  --good-soft: rgba(107, 203, 151, 0.08);
  --warn: #E5A45C;
  --warn-soft: rgba(229, 164, 92, 0.08);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 16px 40px -12px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  background: var(--bg);
  background-image: var(--bg-grad);
  background-attachment: fixed;
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
  font-variation-settings: "opsz" 16;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

a { color: inherit; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
::selection { background: color-mix(in srgb, var(--accent) 25%, transparent); color: var(--text); }

.font-display {
  font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
  font-feature-settings: "ss01";
  letter-spacing: -0.018em;
  font-weight: 600;
}
.font-mono {
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  font-feature-settings: "tnum";
}

h1, h2, h3, h4 { margin: 0; font-weight: 600; line-height: 1.2; letter-spacing: -0.015em; }
h1 { font-size: 1.55rem; }
h2 { font-size: 1.18rem; }
h3 { font-size: 1.02rem; }
p { margin: 0; }
ul { margin: 0; padding: 0; list-style: none; }

.eyebrow {
  display: inline-block;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
}

.container { max-width: 70rem; margin: 0 auto; padding: 0 1.25rem; }

/* Header */
.site-header {
  position: sticky; top: 0; z-index: 40;
  background: color-mix(in srgb, var(--bg) 78%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
}
.site-header .row {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.85rem 1.25rem;
  max-width: 70rem; margin: 0 auto;
}
.brand {
  display: flex; align-items: center; gap: 0.6rem;
  white-space: nowrap;
}
.brand-mark {
  width: 2.1rem; height: 2.1rem; flex: none;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
  display: grid; place-items: center;
  color: #FFF;
  box-shadow: 0 2px 8px -2px color-mix(in srgb, var(--accent) 60%, transparent), var(--shadow-glow);
}
.brand-mark svg { width: 1.05rem; height: 1.05rem; }
.brand-text { display: flex; flex-direction: column; line-height: 1.15; }
.brand .title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.brand .subtitle {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.search-wrap { position: relative; flex: 1; max-width: 32rem; min-width: 0; margin-left: auto; }
.search-wrap::before {
  content: ''; position: absolute;
  left: 0.75rem; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  background: currentColor;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>") center / contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>") center / contain no-repeat;
  color: var(--muted);
  pointer-events: none;
}
.search-wrap input {
  width: 100%;
  padding: 0.55rem 0.85rem 0.55rem 2.2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 0.9rem;
  transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
  box-shadow: var(--shadow-sm);
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus {
  border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
  outline: none;
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
}

#searchResults {
  position: absolute; left: 0; right: 0; top: calc(100% + 0.5rem);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  max-height: 22rem; overflow: auto;
  box-shadow: var(--shadow-lg);
  z-index: 50;
  padding: 0.3rem;
}
#searchResults.hidden { display: none; }
#searchResults button {
  display: block; width: 100%; text-align: left;
  padding: 0.55rem 0.75rem;
  border-radius: 8px;
  transition: background 120ms ease;
}
#searchResults button:hover, #searchResults button:focus { background: var(--surface-2); }
#searchResults .label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--accent);
  font-size: 0.66rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
#searchResults .title { font-size: 0.92rem; font-weight: 500; margin-top: 0.12rem; }

.icon-btn {
  width: 2.1rem; height: 2.1rem;
  display: inline-grid; place-items: center;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted-strong);
  flex: none;
  box-shadow: var(--shadow-sm);
  transition: color 120ms ease, background 120ms ease, border-color 120ms ease;
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }

/* Tabs */
nav.tabs {
  display: flex; gap: 0.15rem;
  padding: 0 1.25rem 0.85rem;
  max-width: 70rem; margin: 0 auto;
  overflow-x: auto;
  scrollbar-width: none;
}
nav.tabs::-webkit-scrollbar { display: none; }
nav.tabs button {
  position: relative;
  padding: 0.55rem 1rem;
  border-radius: 999px;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
  transition: color 140ms ease, background 140ms ease;
}
nav.tabs button:hover { color: var(--text); background: color-mix(in srgb, var(--surface) 60%, transparent); }
nav.tabs button.active {
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm), var(--shadow-glow);
  font-weight: 600;
}
nav.tabs button.active::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  margin-right: 0.45rem;
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}

/* Mobile bottom nav */
nav.mobile-tabs {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  display: none;
  background: color-mix(in srgb, var(--bg) 90%, transparent);
  border-top: 1px solid var(--border);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
}
nav.mobile-tabs .row {
  display: flex; gap: 0;
  max-width: 32rem; margin: 0 auto;
  padding: 0.5rem 0.6rem calc(0.5rem + env(safe-area-inset-bottom, 0px));
}
nav.mobile-tabs button {
  flex: 1; padding: 0.45rem 0.25rem;
  display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
  font-size: 0.7rem; font-weight: 500;
  color: var(--muted);
  border-radius: 8px;
  transition: color 140ms ease, background 140ms ease;
}
nav.mobile-tabs button:hover { color: var(--text); }
nav.mobile-tabs button.active { color: var(--accent); background: var(--accent-soft); font-weight: 600; }
nav.mobile-tabs .ic {
  width: 18px; height: 18px;
  display: inline-grid; place-items: center;
}
nav.mobile-tabs .ic svg { width: 18px; height: 18px; }

@media (max-width: 760px) {
  nav.tabs { display: none; }
  nav.mobile-tabs { display: block; }
  body { padding-bottom: 4.7rem; }
  .brand .subtitle { display: none; }
  .site-header .row { padding: 0.7rem 1rem; gap: 0.6rem; }
  .search-wrap { max-width: none; }
}

/* Main */
main {
  padding: 1.75rem 1.25rem 4rem;
  max-width: 70rem; margin: 0 auto;
}

/* Generic card / panel */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1.25rem 1.4rem;
  box-shadow: var(--shadow-sm), var(--shadow-glow);
}
.panel + .panel { margin-top: 0.85rem; }
.panel-tight { padding: 0.85rem 1rem; }
.panel-feature {
  background: linear-gradient(180deg, var(--surface) 0%, color-mix(in srgb, var(--surface-2) 60%, var(--surface)) 100%);
  box-shadow: var(--shadow-md), var(--shadow-glow);
}

.muted { color: var(--muted); }
.small { font-size: 0.86rem; }
.tiny { font-size: 0.78rem; }
.center { text-align: center; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; }
.divider { height: 1px; background: var(--border); margin: 1rem 0; }

/* Buttons */
.btn {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.45rem;
  padding: 0.55rem 1rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
  font-weight: 500;
  letter-spacing: -0.005em;
  box-shadow: var(--shadow-sm), var(--shadow-glow);
  transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
}
.btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
.btn:active { transform: translateY(1px); box-shadow: var(--shadow-sm); }
.btn-primary {
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, white) 0%, var(--accent) 100%);
  border-color: var(--accent-hover);
  color: #FFFFFF;
  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.18) inset, 0 1px 2px rgba(0,0,0,0.08), 0 6px 18px -8px color-mix(in srgb, var(--accent) 72%, transparent);
}
[data-theme="dark"] .btn-primary {
  color: #15090C;
  background: linear-gradient(180deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 75%, black) 100%);
  border-color: color-mix(in srgb, var(--accent) 60%, black);
}
.btn-primary:hover { filter: brightness(1.04); }
.btn-ghost { border-color: transparent; background: transparent; box-shadow: none; }
.btn-ghost:hover { background: var(--surface-2); border-color: var(--border); }
.btn-danger { color: var(--accent); }
.btn-danger:hover { background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 50%, var(--border)); }
.btn-good { color: var(--good); }
.btn-good:hover { background: var(--good-soft); border-color: color-mix(in srgb, var(--good) 50%, var(--border)); }
.btn-lg { padding: 0.75rem 1.25rem; font-size: 0.95rem; }
.btn-sm { padding: 0.35rem 0.7rem; font-size: 0.82rem; }

/* Inputs */
select, input[type=text], input[type=search] {
  padding: 0.45rem 0.85rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.88rem;
  box-shadow: var(--shadow-sm);
  transition: border-color 140ms ease, box-shadow 140ms ease;
}
select { padding-right: 2rem; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236E655E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>"); background-repeat: no-repeat; background-position: right 0.6rem center; background-size: 14px; }
[data-theme="dark"] select { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239E948C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>"); }
select:focus, input:focus {
  border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
  outline: none;
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
}
label.field {
  display: flex; flex-direction: column; gap: 0.35rem;
  font-size: 0.72rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Page heading */
.page-head {
  display: flex; flex-wrap: wrap; align-items: end; gap: 0.5rem 1.25rem;
  margin-bottom: 1.5rem;
  padding-bottom: 1.1rem;
  border-bottom: 1px solid var(--border);
}
.page-head .heading-block { display: flex; flex-direction: column; gap: 0.35rem; }
.page-head h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 2.1rem;
  font-weight: 600;
  line-height: 1.05;
  letter-spacing: -0.025em;
}
.page-head .meta { color: var(--muted); font-size: 0.86rem; }
.page-head .grow { flex: 1; }
.page-head .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
@media (max-width: 640px) {
  .page-head h1 { font-size: 1.65rem; }
}

/* ---- Notes ---- */
.notes-grid {
  display: grid;
  grid-template-columns: 16rem minmax(0, 1fr);
  gap: 2.5rem;
  align-items: start;
}
@media (max-width: 960px) {
  .notes-grid { grid-template-columns: 1fr; gap: 0; }
  .notes-toc { display: none; }
}
.notes-toc {
  position: sticky; top: 7.4rem;
  max-height: calc(100vh - 9rem);
  overflow-y: auto;
  padding-right: 0.4rem;
}
.notes-toc::-webkit-scrollbar { width: 4px; }
.notes-toc::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
.notes-toc h2 {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 0.85rem;
}
.notes-toc ol { counter-reset: toc; display: grid; gap: 0.1rem; padding: 0; list-style: none; }
.notes-toc li { counter-increment: toc; }
.notes-toc button {
  display: flex; gap: 0.65rem; width: 100%; align-items: baseline;
  padding: 0.5rem 0.7rem;
  border-radius: 7px;
  font-size: 0.88rem;
  color: var(--muted);
  text-align: left;
  line-height: 1.35;
  transition: color 120ms ease, background 120ms ease;
}
.notes-toc button::before {
  content: counter(toc, decimal-leading-zero);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  flex: none;
  letter-spacing: 0.04em;
}
.notes-toc button:hover { color: var(--text); background: var(--surface-2); }
.notes-toc button.read { color: var(--text); font-weight: 500; }
.notes-toc button.read::before { color: var(--good); }
.notes-toc button.read .check {
  display: inline-block; width: 12px; height: 12px;
  margin-left: auto;
  background: var(--good);
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M20 6 9 17l-5-5'/></svg>") center / contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M20 6 9 17l-5-5'/></svg>") center / contain no-repeat;
}
.notes-toc button:not(.read) .check { display: none; }

.note {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1.5rem 1.75rem 1.75rem;
  margin-bottom: 1rem;
  scroll-margin-top: 6.5rem;
  box-shadow: var(--shadow-sm), var(--shadow-glow);
}
.note .note-head {
  display: flex; align-items: baseline; justify-content: space-between; gap: 1rem;
  margin-bottom: 1.1rem;
  padding-bottom: 0.85rem;
  border-bottom: 1px dashed var(--border);
}
.note .note-num {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.3rem;
}
.note > .note-head h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.55rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.note .read-toggle {
  display: inline-flex; align-items: center; gap: 0.45rem;
  cursor: pointer;
  font-size: 0.78rem;
  color: var(--muted);
  padding: 0.3rem 0.6rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
  white-space: nowrap;
  user-select: none;
}
.note .read-toggle:hover { background: var(--surface-2); color: var(--text); }
.note .read-toggle input { accent-color: var(--good); margin: 0; }
.note .read-toggle.is-read { color: var(--good); border-color: color-mix(in srgb, var(--good) 50%, var(--border)); background: var(--good-soft); }

.callouts { display: grid; gap: 0.65rem; margin-bottom: 1.15rem; }
@media (min-width: 640px) {
  .callouts.two { grid-template-columns: 1fr 1fr; }
}
.callout {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0.8rem 1rem 0.85rem 1.1rem;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.callout::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
}
.callout.callout-yield { background: linear-gradient(135deg, var(--accent-soft) 0%, color-mix(in srgb, var(--accent-soft) 30%, var(--surface)) 70%); border-color: color-mix(in srgb, var(--accent) 22%, var(--border)); }
.callout.callout-fact { background: linear-gradient(135deg, color-mix(in srgb, var(--gold) 14%, var(--surface)) 0%, var(--surface) 70%); border-color: color-mix(in srgb, var(--gold) 22%, var(--border)); }
.callout.callout-fact::before { background: var(--gold); }
.callout.callout-trick { background: linear-gradient(135deg, color-mix(in srgb, var(--good) 12%, var(--surface)) 0%, var(--surface) 70%); border-color: color-mix(in srgb, var(--good) 24%, var(--border)); }
.callout.callout-trick::before { background: var(--good); }
.callout .label {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.3rem;
}
.callout.callout-fact .label { color: var(--gold); }
.callout.callout-trick .label { color: var(--good); }
.callout .text { font-size: 0.95rem; line-height: 1.55; color: var(--text); }
.callout .ic-leaf {
  width: 14px; height: 14px;
  background: currentColor;
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  display: inline-block;
}
.callout-yield .ic-leaf { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2 2 19h20Z'/><path d='M12 9v5'/><circle cx='12' cy='17' r='1' fill='currentColor'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2 2 19h20Z'/><path d='M12 9v5'/><circle cx='12' cy='17' r='1' fill='currentColor'/></svg>"); }
.callout-fact .ic-leaf { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='4'/><path d='M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='4'/><path d='M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4'/></svg>"); }
.callout-trick .ic-leaf { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18a4 4 0 0 1-2-7.4V8a5 5 0 0 1 10 0v2.6A4 4 0 0 1 15 18Z'/><path d='M9 22h6'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18a4 4 0 0 1-2-7.4V8a5 5 0 0 1 10 0v2.6A4 4 0 0 1 15 18Z'/><path d='M9 22h6'/></svg>"); }

.subsection { margin-top: 1.15rem; }
.subsection h3 {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  color: var(--muted-strong);
  font-weight: 600;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.subsection ul { display: grid; gap: 0.45rem; }
.subsection li {
  position: relative;
  padding-left: 1.15rem;
  font-size: 0.96rem;
  line-height: 1.6;
  color: var(--text);
}
.subsection li::before {
  content: ''; position: absolute;
  left: 0.05rem; top: 0.7rem;
  width: 5px; height: 5px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0.7;
}
strong {
  color: var(--text);
  font-weight: 600;
  background: linear-gradient(180deg, transparent 65%, color-mix(in srgb, var(--accent) 14%, transparent) 65%);
  padding: 0 0.05em;
}

/* ---- Flashcards ---- */
.cards-toolbar {
  display: flex; flex-wrap: wrap; align-items: end; gap: 0.75rem 1.25rem;
  margin-bottom: 1.25rem;
  padding: 0.85rem 1.05rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  box-shadow: var(--shadow-sm), var(--shadow-glow);
}
.cards-toolbar .grow { flex: 1; }
.cards-toolbar .stat {
  display: flex; flex-direction: column; gap: 0.15rem;
  font-size: 0.86rem;
}
.cards-toolbar .stat .lbl {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
}
.cards-toolbar .stat .val { font-weight: 600; color: var(--text); }
.cards-toolbar .stat .val .num { font-family: 'Fraunces', Georgia, serif; font-size: 1.05rem; }

.flashcard {
  position: relative;
  border: 1px solid var(--border);
  background:
    radial-gradient(120% 80% at 50% 0%, color-mix(in srgb, var(--accent-soft) 50%, transparent) 0%, transparent 50%),
    var(--surface);
  border-radius: var(--r-lg);
  min-height: 18rem;
  padding: 2rem 2rem 1.5rem;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center;
  cursor: pointer;
  transition: transform 200ms ease, border-color 200ms ease, box-shadow 200ms ease;
  box-shadow: var(--shadow-md), var(--shadow-glow);
}
.flashcard:hover { transform: translateY(-1px); border-color: var(--border-strong); box-shadow: var(--shadow-lg), var(--shadow-glow); }
.flashcard:active { transform: translateY(0); }
.flashcard .topic-tag {
  position: absolute; top: 1.05rem; left: 1.25rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
}
.flashcard .side-tag {
  position: absolute; top: 1rem; right: 1.25rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
  padding: 0.25rem 0.55rem;
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
}
.flashcard.is-back .side-tag { background: var(--good-soft); color: var(--good); }
.flashcard .content {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.5rem;
  line-height: 1.3;
  font-weight: 500;
  letter-spacing: -0.015em;
  margin: auto 0;
  max-width: 38rem;
}
.flashcard .hint {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem; color: var(--muted);
  margin-top: 1.4rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
@media (max-width: 640px) {
  .flashcard { min-height: 16rem; padding: 1.5rem 1.25rem 1.25rem; }
  .flashcard .content { font-size: 1.2rem; }
}
.flash-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-top: 1rem;
}
.flash-actions .btn { padding: 0.7rem 1rem; font-size: 0.9rem; }
.flash-skip { margin-top: 0.5rem; }
.flash-help {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 0.85rem;
  letter-spacing: 0.04em;
}
kbd {
  display: inline-block; padding: 0.05rem 0.35rem; border-radius: 4px;
  background: var(--surface-2); border: 1px solid var(--border);
  font-family: inherit; font-size: 0.7rem; color: var(--text);
}

/* ---- Quiz ---- */
.quiz-toolbar {
  display: flex; flex-wrap: wrap; gap: 0.85rem 1.5rem;
  align-items: end;
  margin-bottom: 1.25rem;
  padding: 0.85rem 1.05rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  box-shadow: var(--shadow-sm), var(--shadow-glow);
}
.mode-switch {
  display: inline-flex; gap: 0.1rem; padding: 0.2rem;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface-2);
}
.mode-switch button {
  padding: 0.4rem 1rem;
  border-radius: 999px;
  color: var(--muted);
  font-size: 0.85rem;
  font-weight: 500;
  transition: color 140ms ease, background 140ms ease, box-shadow 140ms ease;
}
.mode-switch button:hover:not(.active) { color: var(--text); }
.mode-switch button.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: var(--shadow-sm), var(--shadow-glow);
  font-weight: 600;
}

.quiz-meta {
  display: flex; flex-direction: column; align-items: flex-end; gap: 0.15rem;
  font-size: 0.86rem;
}
.quiz-meta .lbl {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
}
.quiz-meta .val { font-weight: 600; color: var(--text); }
.quiz-meta .val .num { font-family: 'Fraunces', Georgia, serif; font-size: 1.05rem; }

.quiz-card {
  padding: 1.5rem 1.7rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-md), var(--shadow-glow);
}
.quiz-progress {
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  margin-bottom: 0.5rem;
}
.quiz-progress .progress-text {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
}
.quiz-progress .topic-chip {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
  color: var(--accent);
  padding: 0.2rem 0.55rem;
  background: var(--accent-soft);
  border-radius: 999px;
}
.progress-bar {
  height: 3px; background: var(--surface-2); border-radius: 999px;
  overflow: hidden; margin-bottom: 1.1rem;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-hover) 100%);
  border-radius: 999px;
  transition: width 240ms ease;
}
.quiz-card .question {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 500;
  line-height: 1.35;
  letter-spacing: -0.018em;
  margin-bottom: 1.2rem;
}
.options { display: grid; gap: 0.55rem; }
.option {
  position: relative;
  text-align: left;
  padding: 0.85rem 1rem 0.85rem 2.6rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  font-size: 0.95rem;
  font-weight: 500;
  line-height: 1.5;
  transition: border-color 140ms ease, background 140ms ease, transform 100ms ease;
  box-shadow: var(--shadow-sm);
}
.option::before {
  counter-increment: opt;
  content: counter(opt, upper-alpha);
  position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
  width: 1.4rem; height: 1.4rem;
  display: grid; place-items: center;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface-2);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.72rem; font-weight: 600;
  color: var(--muted-strong);
  transition: inherit;
}
.options { counter-reset: opt; }
.option:hover:not([disabled]) { border-color: var(--border-strong); background: var(--surface-2); transform: translateX(2px); }
.option:hover:not([disabled])::before { border-color: var(--border-strong); }
.option.correct {
  border-color: color-mix(in srgb, var(--good) 50%, var(--border));
  background: var(--good-soft);
}
.option.correct::before { background: var(--good); border-color: var(--good); color: #FFF; }
.option.wrong {
  border-color: color-mix(in srgb, var(--warn) 45%, var(--border));
  background: var(--warn-soft);
}
.option.wrong::before { background: var(--warn); border-color: var(--warn); color: #FFF; }
.option[disabled] { cursor: default; }

.feedback {
  margin-top: 1.2rem;
  padding: 1rem 1.1rem;
  border-radius: var(--r-md);
  font-size: 0.94rem;
  line-height: 1.55;
  border: 1px solid var(--border);
  background: var(--surface-2);
}
.feedback.feedback-ok { background: var(--good-soft); border-color: color-mix(in srgb, var(--good) 35%, var(--border)); }
.feedback.feedback-miss { background: var(--warn-soft); border-color: color-mix(in srgb, var(--warn) 35%, var(--border)); }
.feedback .verdict {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  margin-bottom: 0.4rem;
  display: inline-flex; align-items: center; gap: 0.4rem;
}
.feedback .verdict::before {
  content: ''; width: 14px; height: 14px;
  display: inline-block;
  background: currentColor;
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
}
.feedback.feedback-ok .verdict { color: var(--good); }
.feedback.feedback-ok .verdict::before { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M20 6 9 17l-5-5'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M20 6 9 17l-5-5'/></svg>"); }
.feedback.feedback-miss .verdict { color: var(--warn); }
.feedback.feedback-miss .verdict::before { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M18 6 6 18M6 6l12 12'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M18 6 6 18M6 6l12 12'/></svg>"); }

.results-block {
  background: linear-gradient(180deg, var(--surface) 0%, color-mix(in srgb, var(--accent-soft) 35%, var(--surface)) 100%);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 2rem 1.5rem 1.75rem;
  text-align: center;
  box-shadow: var(--shadow-md), var(--shadow-glow);
}
.results-block .pct {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 4rem;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0.5rem 0 0.25rem;
}
.results-grid {
  display: grid; gap: 0.4rem;
  margin: 1.5rem 0;
  text-align: left;
}
.results-row {
  display: flex; justify-content: space-between; gap: 1rem;
  padding: 0.65rem 0.95rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  font-size: 0.88rem;
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.results-row .stat-correct { color: var(--good); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }
.results-row .stat-wrong { color: var(--warn); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }

/* ---- Mistakes ---- */
.mistake {
  position: relative;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1.1rem 1.25rem;
  background: var(--surface);
  box-shadow: var(--shadow-sm), var(--shadow-glow);
  transition: opacity 200ms ease;
}
.mistake + .mistake { margin-top: 0.7rem; }
.mistake.resolved { opacity: 0.55; }
.mistake .topic {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.68rem; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
}
.mistake h3 {
  margin: 0.35rem 0 0.85rem;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1.4;
}
.mistake .answer-row {
  display: grid; gap: 0.55rem;
  font-size: 0.9rem;
  margin-bottom: 0.85rem;
}
@media (min-width: 640px) {
  .mistake .answer-row { grid-template-columns: 1fr 1fr; }
}
.mistake .answer {
  padding: 0.65rem 0.85rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
}
.mistake .answer.correct-ans { background: var(--good-soft); border-color: color-mix(in srgb, var(--good) 30%, var(--border)); }
.mistake .answer .label {
  display: block;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--muted); font-size: 0.66rem;
  margin-bottom: 0.2rem;
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
}
.mistake .answer.correct-ans .label { color: var(--good); }
.mistake .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

/* ---- Reference ---- */
.ref-section + .ref-section { margin-top: 2.5rem; }
.ref-section .ref-head {
  display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap;
  gap: 0.4rem 1rem;
  margin-bottom: 1rem;
  padding-bottom: 0.55rem;
  border-bottom: 1px solid var(--border);
}
.ref-section .ref-head h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.018em;
}
.ref-section .ref-head .meta { font-size: 0.84rem; color: var(--muted); }

.ref-grid { display: grid; gap: 0.5rem; }
.ref-row {
  display: grid;
  grid-template-columns: 1fr auto 1.4fr;
  align-items: center;
  gap: 1rem;
  padding: 0.85rem 1.1rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  text-align: left;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: border-color 140ms ease, background 140ms ease, transform 100ms ease;
}
.ref-row:hover { border-color: var(--border-strong); background: var(--surface-2); transform: translateX(2px); }
.ref-row .col-label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--muted);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
  margin-bottom: 0.3rem;
  display: block;
}
.ref-row strong {
  font-weight: 600; color: var(--text);
  background: none; padding: 0;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1rem;
  letter-spacing: -0.01em;
  line-height: 1.35;
}
.ref-row .arrow {
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 0.95rem;
}
@media (max-width: 540px) {
  .ref-row { grid-template-columns: 1fr; gap: 0.4rem; }
  .ref-row .arrow { display: none; }
}

.anomaly-row {
  display: grid; gap: 0.6rem;
  padding: 1rem 1.15rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  transition: border-color 140ms ease, transform 100ms ease;
}
.anomaly-row:hover { border-color: var(--border-strong); }
.anomaly-row + .anomaly-row { margin-top: 0.55rem; }
.anomaly-row .head { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
.anomaly-row .head h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: -0.015em;
}
.anomaly-row .tag {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem; color: var(--muted-strong);
  padding: 0.2rem 0.55rem;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-weight: 500;
  letter-spacing: 0.06em;
}
.anomaly-row .syndrome {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem; color: var(--accent);
  font-weight: 600;
  margin-left: auto;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.anomaly-row .field { display: grid; gap: 0.2rem; font-size: 0.92rem; line-height: 1.5; }
.anomaly-row .field .label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--muted); font-size: 0.66rem;
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
}

.mnemonic {
  position: relative;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1.05rem 1.2rem;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent-soft) 30%, transparent) 0%, transparent 60%),
    var(--surface);
  box-shadow: var(--shadow-sm);
}
.mnemonic + .mnemonic { margin-top: 0.55rem; }
.mnemonic .topic {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
}
.mnemonic .phrase {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600; font-size: 1.2rem;
  letter-spacing: -0.018em;
  margin: 0.3rem 0 0.45rem;
  color: var(--text);
}
.mnemonic .stands { font-size: 0.92rem; line-height: 1.55; }
.mnemonic .why {
  font-size: 0.84rem;
  color: var(--muted);
  margin-top: 0.55rem;
  padding-top: 0.55rem;
  border-top: 1px dashed var(--border);
  font-style: italic;
}

/* Modal */
.modal-bg {
  position: fixed; inset: 0; z-index: 60;
  background: color-mix(in srgb, var(--text) 35%, transparent);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: grid; place-items: center;
  padding: 1rem;
  animation: fadeIn 160ms ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1.5rem 1.6rem 1.4rem;
  max-width: 28rem;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: scaleIn 180ms ease;
}
@keyframes scaleIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }
.modal h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 0.55rem;
}
.modal .actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.2rem; }

/* Empty state */
.empty {
  text-align: center;
  padding: 3.5rem 1.5rem;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--r-lg);
  color: var(--muted);
}
.empty .ic-mark {
  width: 44px; height: 44px;
  margin: 0 auto 0.85rem;
  display: grid; place-items: center;
  background: var(--accent-soft);
  border-radius: 50%;
  color: var(--accent);
}
.empty .ic-mark svg { width: 22px; height: 22px; }
.empty h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 0.5rem;
}
.empty p { color: var(--muted); }

@media print {
  .site-header, nav.mobile-tabs, .read-toggle, .btn, button { display: none !important; }
  body { background: white; color: black; padding: 0; background-image: none; }
  main { padding: 0; }
  .panel, .note, .callout, .mnemonic, .anomaly-row { break-inside: avoid; border: 1px solid #ccc !important; background: white !important; box-shadow: none !important; }
}

    const trueFalse = [
      { id: 'tf1', topic: 'Big Picture', q: 'Heart development begins Day 22–23 (Week 3).', answer: true, explanation: 'Begins **Day 22–23 (Week 3)**.' },

    const mcqs = [...baseMcqs, ...importedMcqs];

    const allTopics = (() => {
      const set = new Set();
      flashcards.forEach(c => set.add(c.topic));
      mcqs.forEach(q => set.add(q.topic));
      trueFalse.forEach(q => set.add(q.topic));
      return Array.from(set).sort();
    })();

    const defaultState = {
      version: 2,
      theme: 'light',
      lastTab: 'notes',
      readSections: [],
      flashStatus: {},          // cardId -> 'known' | 'review'
      mistakes: [],             // recent missed questions
      lastMistakeId: 0,
      quizLength: 'all'         // '10' | '25' | '50' | '100' | 'all'
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        if (!raw) return migrateLegacy();
        return mergeState(structuredClone(defaultState), JSON.parse(raw));
      } catch (e) { return structuredClone(defaultState); }
    }

    function migrateLegacy() {
      // Pull anything from the v1 schema if present (older "heart-development-study-app-v1" key).
      const base = structuredClone(defaultState);
      try {
        const raw = localStorage.getItem('heart-development-study-app-v1');
        if (!raw) return base;
        const old = JSON.parse(raw);
        base.theme = old.theme || base.theme;
        base.readSections = old.readSections || [];
        if (old.flashcards?.known) old.flashcards.known.forEach(id => base.flashStatus[id] = 'known');
        if (old.flashcards?.review) old.flashcards.review.forEach(id => { if (base.flashStatus[id] !== 'known') base.flashStatus[id] = 'review'; });
        if (Array.isArray(old.mistakes)) base.mistakes = old.mistakes.slice(0, 200);
      } catch (e) { /* ignore */ }
      return base;
    }

    function mergeState(base, saved) {
      for (const k of Object.keys(saved || {})) {
        if (saved[k] && typeof saved[k] === 'object' && !Array.isArray(saved[k]) && base[k] && typeof base[k] === 'object' && !Array.isArray(base[k])) {
          base[k] = mergeState(base[k], saved[k]);
        } else {
          base[k] = saved[k];
        }
      }
      return base;
    }

    function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

    let state = loadState();
    let activeTab = state.lastTab || 'notes';
    let searchQuery = '';

    // Per-view ephemeral state
    let flash = { topic: 'All', flipped: false, queue: [], index: 0 };
    let quiz  = { mode: 'mcq', topic: 'All', index: 0, order: [], answers: {}, complete: false, reviewIds: null };

    const root = document.getElementById('app');
    const tabsEl = document.getElementById('tabs');
    const mobileTabsEl = document.getElementById('mobileTabs');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const themeToggle = document.getElementById('themeToggle');
    const modalRoot = document.getElementById('modalRoot');

    /* ---------- helpers ---------- */
    function escapeHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }
    function md(s) {
      // Render bold ** ** and arrows.
      return escapeHtml(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function textOfSection(section) {
      return [
        section.title,
        ...section.callouts.map(c => `${c.type} ${c.text}`),
        ...section.subsections.flatMap(s => [s.title, ...s.bullets])
      ].join(' ').replace(/\*\*/g, '');
    }

    /* ---------- nav ---------- */
    const SUN_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`;
    const MOON_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

    function renderNav() {
      const desktop = tabs.map(t => `<button data-tab="${t.id}" class="${activeTab === t.id ? 'active' : ''}">${t.label}</button>`).join('');
      tabsEl.innerHTML = desktop;
      const mobile = `<div class="row">${tabs.map(t => `<button data-tab="${t.id}" class="${activeTab === t.id ? 'active' : ''}"><span class="ic">${tabIcons[t.id] || ''}</span><span>${t.label}</span></button>`).join('')}</div>`;
      mobileTabsEl.innerHTML = mobile;
      themeToggle.innerHTML = state.theme === 'dark' ? SUN_ICON : MOON_ICON;
    }

    function switchTab(id, opts = {}) {
      activeTab = id;
      state.lastTab = id;
      saveState();
      render();
      requestAnimationFrame(() => {
        if (opts.target) {
          document.getElementById(opts.target)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollTo({ top: 0, behavior: 'instant' });
        }
      });
    }

    /* ---------- render ---------- */
    function render() {
      document.body.dataset.theme = state.theme;
      renderNav();
      const r = ({
        notes: renderNotes,
        flashcards: renderFlashcards,
        quiz: renderQuiz,
        mistakes: renderMistakes,
        reference: renderReference
      })[activeTab] || renderNotes;
      root.innerHTML = r();
      renderSearchResults();
    }

    /* ---------- Notes ---------- */
    function calloutKind(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('high-yield')) return { cls: 'callout-yield', clean: 'High-Yield' };
      if (t.includes('cool fact')) return { cls: 'callout-fact', clean: 'Cool Fact' };
      if (t.includes('memory'))    return { cls: 'callout-trick', clean: 'Memory Trick' };
      return { cls: 'callout-yield', clean: type.replace(/^[^A-Za-z]+/, '') || 'Note' };
    }

    function renderNotes() {
      const visible = !searchQuery
        ? notes
        : notes.filter(n => textOfSection(n).toLowerCase().includes(searchQuery.toLowerCase()));
      const readCount = notes.filter(n => state.readSections.includes(n.id)).length;
      const tocItems = notes.map(n => {
        const isRead = state.readSections.includes(n.id);
        return `<li><button data-action="jump-note" data-target="${n.id}" class="${isRead ? 'read' : ''}">
          <span>${escapeHtml(n.title)}</span>
          <span class="check" aria-hidden="true"></span>
        </button></li>`;
      }).join('');
      const body = visible.length
        ? visible.map(renderNote).join('')
        : `<div class="empty">
            <span class="ic-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
            <h2>No notes match "${escapeHtml(searchQuery)}"</h2>
            <p>Try a different word or clear the search.</p>
          </div>`;
      return `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Embryology · Lecture notes</span>
            <h1>Development of the Heart</h1>
            <span class="meta">${readCount} of ${notes.length} sections read</span>
          </div>
        </div>
        <div class="notes-grid">
          <aside class="notes-toc">
            <h2>Contents</h2>
            <ol>${tocItems}</ol>
          </aside>
          <div>${body}</div>
        </div>`;
    }

    function renderNote(section) {
      const isRead = state.readSections.includes(section.id);
      const calloutCls = section.callouts.length === 2 ? 'callouts two' : 'callouts';
      const callouts = section.callouts.length ? `
        <div class="${calloutCls}">
          ${section.callouts.map(c => {
            const k = calloutKind(c.type);
            return `
              <div class="callout ${k.cls}">
                <span class="label"><span class="ic-leaf" aria-hidden="true"></span>${escapeHtml(k.clean)}</span>
                <span class="text">${md(c.text)}</span>
              </div>`;
          }).join('')}
        </div>` : '';
      const subs = section.subsections.map(sub => `
        <div class="subsection">
          <h3>${escapeHtml(sub.title)}</h3>
          <ul>${sub.bullets.map(b => `<li>${md(b)}</li>`).join('')}</ul>
        </div>`).join('');
      const idx = notes.findIndex(n => n.id === section.id) + 1;
      return `
        <article class="note" id="${section.id}">
          <div class="note-head">
            <div>
              <span class="note-num">Section ${String(idx).padStart(2, '0')}</span>
              <h2>${escapeHtml(section.title)}</h2>
            </div>
            <label class="read-toggle ${isRead ? 'is-read' : ''}">
              <input type="checkbox" data-action="toggle-read" data-id="${section.id}" ${isRead ? 'checked' : ''}>
              <span>${isRead ? 'Read' : 'Mark as read'}</span>
            </label>
          </div>
          ${callouts}
          ${subs}
        </article>`;
    }

    /* ---------- Flashcards ---------- */
    function ensureFlashQueue(force = false) {
      const matchTopic = c => flash.topic === 'All' || c.topic === flash.topic;
      const matchSearch = c => !searchQuery || `${c.topic} ${c.front} ${c.back}`.toLowerCase().includes(searchQuery.toLowerCase());
      const pool = flashcards.filter(c => matchTopic(c) && matchSearch(c));
      if (!force && flash.queue.length && flash.queue[flash.index] && pool.some(c => c.id === flash.queue[flash.index])) {
        // Queue still has a current card matching the filter — reuse.
        return;
      }
      // Prioritise: review first, then new, then known.
      const review = pool.filter(c => state.flashStatus[c.id] === 'review');
      const fresh  = pool.filter(c => !state.flashStatus[c.id]);
      const known  = pool.filter(c => state.flashStatus[c.id] === 'known');
      flash.queue = shuffle(review).concat(shuffle(fresh)).concat(shuffle(known)).map(c => c.id);
      flash.index = 0;
      flash.flipped = false;
    }

    function renderFlashcards() {
      ensureFlashQueue();
      const topics = ['All', ...flashcardTopics()];
      const total = flashcards.length;
      const known = Object.values(state.flashStatus).filter(s => s === 'known').length;
      const reviewN = Object.values(state.flashStatus).filter(s => s === 'review').length;
      const head = `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Active recall</span>
            <h1>Flashcards</h1>
            <span class="meta">${known} known · ${reviewN} to review · ${total} total</span>
          </div>
        </div>`;
      if (!flash.queue.length) {
        return `${head}
          <div class="cards-toolbar">
            <label class="field">Topic
              <select data-action="flash-topic">
                ${topics.map(t => `<option ${flash.topic === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
              </select>
            </label>
          </div>
          <div class="empty">

            <h2>No cards in this filter</h2>
            <p>Try a different topic or clear the search.</p>
          </div>`;
      }
      const id = flash.queue[flash.index];
      const card = flashcards.find(c => c.id === id);
      const status = state.flashStatus[card.id] || 'new';
      const statusLabel = status === 'known' ? 'Mastered' : status === 'review' ? 'Reviewing' : 'New';
      return `${head}
        <div class="cards-toolbar">
          <label class="field">Topic
            <select data-action="flash-topic">
              ${topics.map(t => `<option ${flash.topic === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
            </select>
          </label>
          <div class="stat">
