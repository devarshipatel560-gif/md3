<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Minimalist study companion for Development of the Heart embryology." />
  <!-- Cache hints. GitHub Pages defaults serve HTML with max-age=600. These
       help the browser revalidate sooner on repeat visits; the runtime
       version-check below catches anything still served from cache. -->
  <meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Heart Embryology — Study</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath fill='%239C1B2E' d='M32 56S6 41 4 22C2 8 19 3 32 18 45 3 62 8 60 22 58 41 32 56 32 56z'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;450;500;550;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #F8F6F2;
  --bg-grad: radial-gradient(1100px 540px at 80% -10%, rgba(159, 18, 57, 0.06), transparent 60%),
             radial-gradient(900px 480px at -10% 40%, rgba(122, 27, 60, 0.04), transparent 60%);
  --surface: #FFFFFF;
  --surface-2: #F2EFE9;
  --surface-3: #ECE7DD;
  --text: #1B1715;
  --muted: #6E655E;
  --muted-strong: #4D4540;
  --border: #E6E1D7;
  --border-strong: #CFC8B9;
  --accent: #8B1538;
  --accent-soft: #F8E6EA;
  --accent-hover: #6F0F2C;
  --gold: #B8893E;
  --good: #15734A;
  --good-soft: #E5F2EB;
  --warn: #A6500F;
  --warn-soft: #FBEFE0;
  --shadow-sm: 0 1px 2px rgba(28, 23, 21, 0.04), 0 1px 3px rgba(28, 23, 21, 0.04);
  --shadow-md: 0 1px 2px rgba(28, 23, 21, 0.05), 0 4px 12px rgba(28, 23, 21, 0.06);
  --shadow-lg: 0 1px 3px rgba(28, 23, 21, 0.06), 0 16px 40px -12px rgba(28, 23, 21, 0.14);
  --shadow-glow: 0 1px 0 rgba(255, 255, 255, 0.6) inset;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  color-scheme: light;
}
[data-theme="dark"] {
  --bg: #131113;
  --bg-grad: radial-gradient(1100px 540px at 80% -10%, rgba(255, 105, 130, 0.08), transparent 60%),
             radial-gradient(900px 480px at -10% 40%, rgba(184, 137, 62, 0.06), transparent 60%);
  --surface: #1C191B;
  --surface-2: #232023;
  --surface-3: #2C282B;
  --text: #F1ECE5;
  --muted: #9E948C;
  --muted-strong: #C2B8AF;
  --border: #2D292C;
  --border-strong: #3F3A3D;
  --accent: #F26B86;
  --accent-soft: rgba(242, 107, 134, 0.1);
  --accent-hover: #FF8AA0;
  --gold: #D9A94C;
  --good: #6BCB97;
  --good-soft: rgba(107, 203, 151, 0.08);
  --warn: #E5A45C;
  --warn-soft: rgba(229, 164, 92, 0.08);
  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 14px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 16px 40px -12px rgba(0, 0, 0, 0.5);
  --shadow-glow: 0 1px 0 rgba(255, 255, 255, 0.04) inset;
  color-scheme: dark;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body {
  background: var(--bg);
  background-image: var(--bg-grad);
  background-attachment: fixed;
  color: var(--text);
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
  font-variation-settings: "opsz" 16;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}

a { color: inherit; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
::selection { background: color-mix(in srgb, var(--accent) 25%, transparent); color: var(--text); }

.font-display {
  font-family: 'Fraunces', Georgia, 'Times New Roman', serif;
  font-feature-settings: "ss01";
  letter-spacing: -0.018em;
  font-weight: 600;
}
.font-mono {
  font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  font-feature-settings: "tnum";
}

h1, h2, h3, h4 { margin: 0; font-weight: 600; line-height: 1.2; letter-spacing: -0.015em; }
h1 { font-size: 1.55rem; }
h2 { font-size: 1.18rem; }
h3 { font-size: 1.02rem; }
p { margin: 0; }
ul { margin: 0; padding: 0; list-style: none; }

.eyebrow {
  display: inline-block;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
}

.container { max-width: 88rem; margin: 0 auto; padding: 0 1.25rem; }

/* Header */
.site-header {
  position: sticky; top: 0; z-index: 40;
  background: color-mix(in srgb, var(--bg) 78%, transparent);
  border-bottom: 1px solid var(--border);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
}
.site-header .row {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.85rem 1.25rem;
  max-width: 88rem; margin: 0 auto;
}
.brand {
  display: flex; align-items: center; gap: 0.6rem;
  white-space: nowrap;
}
.brand-mark {
  width: 2.1rem; height: 2.1rem; flex: none;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
  display: grid; place-items: center;
  color: #FFF;
  box-shadow: 0 2px 8px -2px color-mix(in srgb, var(--accent) 60%, transparent), var(--shadow-glow);
}
.brand-mark svg { width: 1.05rem; height: 1.05rem; }
.brand-text { display: flex; flex-direction: column; line-height: 1.15; }
.brand .title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--text);
}
.brand .subtitle {
  color: var(--muted);
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.search-wrap { position: relative; flex: 1; max-width: 32rem; min-width: 0; margin-left: auto; }
.search-wrap::before {
  content: ''; position: absolute;
  left: 0.75rem; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  background: currentColor;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>") center / contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2'><circle cx='11' cy='11' r='8'/><path d='m21 21-4.3-4.3'/></svg>") center / contain no-repeat;
  color: var(--muted);
  pointer-events: none;
}
/* Specificity bump: .search-wrap input[type="search"] beats the generic
   `select, input[type=text], input[type=search]` rule below regardless of
   source order — without it, the generic rule's padding-left reflows the
   placeholder so it overlaps the magnifying-glass icon. */
.search-wrap input[type="search"] {
  width: 100%;
  padding: 0.55rem 0.85rem 0.55rem 2.2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 0.9rem;
  transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
  box-shadow: var(--shadow-sm);
}
.search-wrap input[type="search"]::placeholder { color: var(--muted); }
.search-wrap input[type="search"]:focus {
  border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
  outline: none;
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
}

#searchResults {
  position: absolute; left: 0; right: 0; top: calc(100% + 0.5rem);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  max-height: 22rem; overflow: auto;
  box-shadow: var(--shadow-lg);
  z-index: 50;
  padding: 0.3rem;
}
#searchResults.hidden { display: none; }
#searchResults button {
  display: block; width: 100%; text-align: left;
  padding: 0.55rem 0.75rem;
  border-radius: 8px;
  transition: background 120ms ease;
}
#searchResults button:hover, #searchResults button:focus { background: var(--surface-2); }
#searchResults .label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--accent);
  font-size: 0.66rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
#searchResults .title { font-size: 0.92rem; font-weight: 500; margin-top: 0.12rem; }

.icon-btn {
  width: 2.1rem; height: 2.1rem;
  display: inline-grid; place-items: center;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted-strong);
  flex: none;
  box-shadow: var(--shadow-sm);
  transition: color 120ms ease, background 120ms ease, border-color 120ms ease;
}
.icon-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }

/* Tabs */
nav.tabs {
  display: flex; gap: 0.15rem;
  padding: 0 1.25rem 0.85rem;
  max-width: 88rem; margin: 0 auto;
  overflow-x: auto;
  scrollbar-width: none;
}
nav.tabs::-webkit-scrollbar { display: none; }
nav.tabs button {
  position: relative;
  padding: 0.55rem 1rem;
  border-radius: 999px;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--muted);
  white-space: nowrap;
  transition: color 140ms ease, background 140ms ease;
}
nav.tabs button:hover { color: var(--text); background: color-mix(in srgb, var(--surface) 60%, transparent); }
nav.tabs button.active {
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm), var(--shadow-glow);
  font-weight: 600;
}
nav.tabs button.active::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
  margin-right: 0.45rem;
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
}

/* Mobile bottom nav */
nav.mobile-tabs {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
  display: none;
  background: color-mix(in srgb, var(--bg) 90%, transparent);
  border-top: 1px solid var(--border);
  backdrop-filter: saturate(180%) blur(14px);
  -webkit-backdrop-filter: saturate(180%) blur(14px);
}
nav.mobile-tabs .row {
  display: flex; gap: 0;
  max-width: 32rem; margin: 0 auto;
  padding: 0.5rem 0.6rem calc(0.5rem + env(safe-area-inset-bottom, 0px));
}
nav.mobile-tabs button {
  flex: 1; padding: 0.45rem 0.25rem;
  display: flex; flex-direction: column; align-items: center; gap: 0.2rem;
  font-size: 0.7rem; font-weight: 500;
  color: var(--muted);
  border-radius: 8px;
  transition: color 140ms ease, background 140ms ease;
}
nav.mobile-tabs button:hover { color: var(--text); }
nav.mobile-tabs button.active { color: var(--accent); background: var(--accent-soft); font-weight: 600; }
nav.mobile-tabs .ic {
  width: 18px; height: 18px;
  display: inline-grid; place-items: center;
}
nav.mobile-tabs .ic svg { width: 18px; height: 18px; }

@media (max-width: 760px) {
  nav.tabs { display: none; }
  nav.mobile-tabs { display: block; }
  body { padding-bottom: 4.7rem; }
  .brand .subtitle { display: none; }
  .site-header .row { padding: 0.7rem 1rem; gap: 0.6rem; }
  .search-wrap { max-width: none; }
}

/* Main */
main {
  padding: 1.75rem 1.25rem 4rem;
  max-width: 88rem; margin: 0 auto;
}

/* Generic card / panel */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1.25rem 1.4rem;
  box-shadow: var(--shadow-sm), var(--shadow-glow);
}
.panel + .panel { margin-top: 0.85rem; }
.panel-tight { padding: 0.85rem 1rem; }
.panel-feature {
  background: linear-gradient(180deg, var(--surface) 0%, color-mix(in srgb, var(--surface-2) 60%, var(--surface)) 100%);
  box-shadow: var(--shadow-md), var(--shadow-glow);
}

.muted { color: var(--muted); }
.small { font-size: 0.86rem; }
.tiny { font-size: 0.78rem; }
.center { text-align: center; }
.row-between { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; }
.divider { height: 1px; background: var(--border); margin: 1rem 0; }

/* Buttons */
.btn {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.45rem;
  padding: 0.55rem 1rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  font-size: 0.88rem;
  font-weight: 500;
  letter-spacing: -0.005em;
  box-shadow: var(--shadow-sm), var(--shadow-glow);
  transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease, box-shadow 140ms ease;
}
.btn:hover { background: var(--surface-2); border-color: var(--border-strong); }
.btn:active { transform: translateY(1px); box-shadow: var(--shadow-sm); }
.btn-primary {
  background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 92%, white) 0%, var(--accent) 100%);
  border-color: var(--accent-hover);
  color: #FFFFFF;
  box-shadow: 0 1px 0 rgba(255, 255, 255, 0.18) inset, 0 1px 2px rgba(0,0,0,0.08), 0 6px 18px -8px color-mix(in srgb, var(--accent) 72%, transparent);
}
[data-theme="dark"] .btn-primary {
  color: #15090C;
  background: linear-gradient(180deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 75%, black) 100%);
  border-color: color-mix(in srgb, var(--accent) 60%, black);
}
.btn-primary:hover { filter: brightness(1.04); }
.btn-ghost { border-color: transparent; background: transparent; box-shadow: none; }
.btn-ghost:hover { background: var(--surface-2); border-color: var(--border); }
.btn-danger { color: var(--accent); }
.btn-danger:hover { background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 50%, var(--border)); }
.btn-good { color: var(--good); }
.btn-good:hover { background: var(--good-soft); border-color: color-mix(in srgb, var(--good) 50%, var(--border)); }
.btn-lg { padding: 0.75rem 1.25rem; font-size: 0.95rem; }
.btn-sm { padding: 0.35rem 0.7rem; font-size: 0.82rem; }

/* Inputs */
select, input[type=text], input[type=search] {
  padding: 0.45rem 0.85rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.88rem;
  box-shadow: var(--shadow-sm);
  transition: border-color 140ms ease, box-shadow 140ms ease;
}
select { padding-right: 2rem; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236E655E' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>"); background-repeat: no-repeat; background-position: right 0.6rem center; background-size: 14px; }
[data-theme="dark"] select { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239E948C' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>"); }
/* Focus halo: only for box-shaped inputs. Range sliders have no border to
   anchor against, so the halo bleeds past the parent container — scope it
   out and let the native slider handle its own focus indicator. */
select:focus, input[type="text"]:focus, input[type="search"]:focus, input[type="number"]:focus, textarea:focus {
  border-color: color-mix(in srgb, var(--accent) 60%, var(--border));
  outline: none;
  box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 10%, transparent);
}
input[type="range"] {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  /* Don't inherit the boxy input border / padding rules. */
  padding: 0;
  border: 0;
  background: transparent;
  box-shadow: none;
}
input[type="range"]:focus { outline: none; box-shadow: none; }
input[type="range"]:focus-visible { outline: 2px solid color-mix(in srgb, var(--accent) 50%, transparent); outline-offset: 2px; border-radius: 999px; }
label.field {
  display: flex; flex-direction: column; gap: 0.35rem;
  font-size: 0.72rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Page heading */
.page-head {
  display: flex; flex-wrap: wrap; align-items: end; gap: 0.5rem 1.25rem;
  margin-bottom: 1.5rem;
  padding-bottom: 1.1rem;
  border-bottom: 1px solid var(--border);
}
.page-head .heading-block { display: flex; flex-direction: column; gap: 0.35rem; }
.page-head h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 2.1rem;
  font-weight: 600;
  line-height: 1.05;
  letter-spacing: -0.025em;
}
.page-head .meta { color: var(--muted); font-size: 0.86rem; }
.page-head .grow { flex: 1; }
.page-head .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
@media (max-width: 640px) {
  .page-head h1 { font-size: 1.65rem; }
}

/* ---- Notes ---- */
.notes-grid {
  display: grid;
  grid-template-columns: 16rem minmax(0, 1fr);
  gap: 2.5rem;
  align-items: start;
}
@media (max-width: 960px) {
  .notes-grid { grid-template-columns: 1fr; gap: 0; }
  .notes-toc { display: none; }
}
.notes-toc {
  position: sticky; top: 7.4rem;
  max-height: calc(100vh - 9rem);
  overflow-y: auto;
  padding-right: 0.4rem;
}
.notes-toc::-webkit-scrollbar { width: 4px; }
.notes-toc::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
.notes-toc h2 {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 0.85rem;
}
.notes-toc ol { counter-reset: toc; display: grid; gap: 0.1rem; padding: 0; list-style: none; }
.notes-toc li { counter-increment: toc; }
.notes-toc button {
  display: flex; gap: 0.65rem; width: 100%; align-items: baseline;
  padding: 0.5rem 0.7rem;
  border-radius: 7px;
  font-size: 0.88rem;
  color: var(--muted);
  text-align: left;
  line-height: 1.35;
  transition: color 120ms ease, background 120ms ease;
}
.notes-toc button::before {
  content: counter(toc, decimal-leading-zero);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  flex: none;
  letter-spacing: 0.04em;
}
.notes-toc button:hover { color: var(--text); background: var(--surface-2); }
.notes-toc button.read { color: var(--text); font-weight: 500; }
.notes-toc button.read::before { color: var(--good); }
.notes-toc button.read .check {
  display: inline-block; width: 12px; height: 12px;
  margin-left: auto;
  background: var(--good);
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M20 6 9 17l-5-5'/></svg>") center / contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M20 6 9 17l-5-5'/></svg>") center / contain no-repeat;
}
.notes-toc button:not(.read) .check { display: none; }

.note {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1.5rem 1.75rem 1.75rem;
  margin-bottom: 1rem;
  scroll-margin-top: 6.5rem;
  box-shadow: var(--shadow-sm), var(--shadow-glow);
}
.note .note-head {
  display: flex; align-items: baseline; justify-content: space-between; gap: 1rem;
  margin-bottom: 1.1rem;
  padding-bottom: 0.85rem;
  border-bottom: 1px dashed var(--border);
}
.note .note-num {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  letter-spacing: 0.14em;
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.3rem;
}
.note > .note-head h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.55rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.note .read-toggle {
  display: inline-flex; align-items: center; gap: 0.45rem;
  cursor: pointer;
  font-size: 0.78rem;
  color: var(--muted);
  padding: 0.3rem 0.6rem;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
  white-space: nowrap;
  user-select: none;
}
.note .read-toggle:hover { background: var(--surface-2); color: var(--text); }
.note .read-toggle input { accent-color: var(--good); margin: 0; }
.note .read-toggle.is-read { color: var(--good); border-color: color-mix(in srgb, var(--good) 50%, var(--border)); background: var(--good-soft); }

.callouts { display: grid; gap: 0.65rem; margin-bottom: 1.15rem; }
@media (min-width: 640px) {
  .callouts.two { grid-template-columns: 1fr 1fr; }
}
.callout {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0.8rem 1rem 0.85rem 1.1rem;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.callout::before {
  content: ''; position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
}
.callout.callout-yield { background: linear-gradient(135deg, var(--accent-soft) 0%, color-mix(in srgb, var(--accent-soft) 30%, var(--surface)) 70%); border-color: color-mix(in srgb, var(--accent) 22%, var(--border)); }
.callout.callout-fact { background: linear-gradient(135deg, color-mix(in srgb, var(--gold) 14%, var(--surface)) 0%, var(--surface) 70%); border-color: color-mix(in srgb, var(--gold) 22%, var(--border)); }
.callout.callout-fact::before { background: var(--gold); }
.callout.callout-trick { background: linear-gradient(135deg, color-mix(in srgb, var(--good) 12%, var(--surface)) 0%, var(--surface) 70%); border-color: color-mix(in srgb, var(--good) 24%, var(--border)); }
.callout.callout-trick::before { background: var(--good); }
.callout .label {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.3rem;
}
.callout.callout-fact .label { color: var(--gold); }
.callout.callout-trick .label { color: var(--good); }
.callout .text { font-size: 0.95rem; line-height: 1.55; color: var(--text); }
.callout .ic-leaf {
  width: 14px; height: 14px;
  background: currentColor;
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  -webkit-mask-position: center; mask-position: center;
  display: inline-block;
}
.callout-yield .ic-leaf { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2 2 19h20Z'/><path d='M12 9v5'/><circle cx='12' cy='17' r='1' fill='currentColor'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2 2 19h20Z'/><path d='M12 9v5'/><circle cx='12' cy='17' r='1' fill='currentColor'/></svg>"); }
.callout-fact .ic-leaf { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='4'/><path d='M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='4'/><path d='M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4'/></svg>"); }
.callout-trick .ic-leaf { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18a4 4 0 0 1-2-7.4V8a5 5 0 0 1 10 0v2.6A4 4 0 0 1 15 18Z'/><path d='M9 22h6'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M9 18a4 4 0 0 1-2-7.4V8a5 5 0 0 1 10 0v2.6A4 4 0 0 1 15 18Z'/><path d='M9 22h6'/></svg>"); }

.note-lead {
  display: grid; gap: 0.85rem;
  margin: 0 0 1.2rem;
  font-size: 1.02rem;
  line-height: 1.7;
  color: var(--text);
}
.note-lead p { color: var(--text); }
.note-lead p:first-child::first-letter {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 2.6em;
  float: left;
  line-height: 0.85;
  margin: 0.35rem 0.55rem 0 0;
  color: var(--accent);
  font-weight: 700;
}
.note-diagram {
  margin: 1.2rem 0;
  padding: 1.25rem 1rem 1rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background:
    repeating-linear-gradient(45deg, color-mix(in srgb, var(--accent-soft) 30%, transparent) 0 1px, transparent 1px 14px),
    var(--surface);
  text-align: center;
}
.note-diagram svg {
  max-width: 100%;
  height: auto;
  color: var(--text);
}
.note-diagram .caption {
  display: block;
  margin-top: 0.65rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
}
.note-video {
  display: flex; align-items: center; gap: 0.85rem;
  padding: 0.85rem 1rem;
  margin: 1.1rem 0;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: linear-gradient(135deg, color-mix(in srgb, var(--accent-soft) 35%, var(--surface)) 0%, var(--surface) 60%);
  text-decoration: none;
  color: var(--text);
  transition: border-color 140ms ease, transform 100ms ease, box-shadow 140ms ease;
  box-shadow: var(--shadow-sm);
}
.note-video:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.note-video .play {
  width: 2.2rem; height: 2.2rem; flex: none;
  display: grid; place-items: center;
  border-radius: 50%;
  background: var(--accent);
  color: #FFF;
  font-size: 0.85rem;
  padding-left: 2px;
}
.note-video .label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.14em;
  color: var(--accent);
  font-weight: 600;
  display: block;
  margin-bottom: 0.15rem;
}
.note-video .title { display: block; font-weight: 600; font-size: 0.95rem; }
.note-video .meta { display: block; color: var(--muted); font-size: 0.78rem; margin-top: 0.1rem; }
.note-clinical {
  margin: 1.1rem 0 0.4rem;
  padding: 1rem 1.1rem;
  border: 1px solid color-mix(in srgb, #1F6FB2 30%, var(--border));
  border-left: 3px solid #1F6FB2;
  border-radius: var(--r-md);
  background: linear-gradient(135deg, color-mix(in srgb, #1F6FB2 10%, var(--surface)) 0%, var(--surface) 70%);
}
[data-theme="dark"] .note-clinical { border-color: color-mix(in srgb, #6BA8E0 35%, var(--border)); border-left-color: #6BA8E0; background: linear-gradient(135deg, color-mix(in srgb, #6BA8E0 10%, var(--surface)) 0%, var(--surface) 70%); }
.note-clinical .label {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #1F6FB2;
  margin-bottom: 0.4rem;
}
[data-theme="dark"] .note-clinical .label { color: #6BA8E0; }
.note-clinical .label::before {
  content: ''; width: 14px; height: 14px;
  background: currentColor;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M11 2v2M11 22v-2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41'/><path d='M5 11a6 6 0 0 0 12 0V8a4 4 0 0 0-8 0'/><circle cx='17' cy='17' r='3'/></svg>") center / contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M11 2v2M11 22v-2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41'/><path d='M5 11a6 6 0 0 0 12 0V8a4 4 0 0 0-8 0'/><circle cx='17' cy='17' r='3'/></svg>") center / contain no-repeat;
}
.note-clinical h4 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: -0.015em;
  margin-bottom: 0.4rem;
  color: var(--text);
}
.note-clinical p { font-size: 0.95rem; line-height: 1.6; color: var(--text); }
.note-clinical ul { display: grid; gap: 0.3rem; margin-top: 0.5rem; }
.note-clinical li { position: relative; padding-left: 1rem; font-size: 0.92rem; line-height: 1.55; }
.note-clinical li::before { content: ''; position: absolute; left: 0.1rem; top: 0.65rem; width: 5px; height: 5px; background: #1F6FB2; border-radius: 50%; }
[data-theme="dark"] .note-clinical li::before { background: #6BA8E0; }

/* ─── Tutor-mode blocks ────────────────────────────────────────────── */
.note-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.85rem; flex-wrap: wrap; }
.note-head-text { min-width: 0; flex: 1 1 16rem; }
.note-head-actions { display: flex; gap: 0.55rem; align-items: center; flex-wrap: wrap; }
.reading-time {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
}
.tutor-toggle {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted-strong);
  padding: 0.35rem 0.75rem;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
}
.tutor-toggle:hover { background: var(--surface-3); color: var(--text); }
.tutor-toggle.is-on { color: var(--accent); background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 35%, var(--border)); }

/* Listen button (per-section TTS) ─────────────────────────────────── */
.listen-btn {
  display: inline-flex; align-items: center; gap: 0.4rem;
  padding: 0.32rem 0.7rem 0.32rem 0.55rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted-strong);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  cursor: pointer;
  transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
}
.listen-btn:hover { background: var(--surface-3); color: var(--text); }
.listen-btn.is-playing { color: var(--accent); background: var(--accent-soft); border-color: color-mix(in srgb, var(--accent) 40%, var(--border)); }
.listen-btn .listen-icon {
  width: 14px; height: 14px;
  display: inline-block;
  background: currentColor;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><polygon points='11 5 6 9 2 9 2 15 6 15 11 19 11 5'/><path d='M15.54 8.46a5 5 0 0 1 0 7.07'/><path d='M19.07 4.93a10 10 0 0 1 0 14.14'/></svg>") center / contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><polygon points='11 5 6 9 2 9 2 15 6 15 11 19 11 5'/><path d='M15.54 8.46a5 5 0 0 1 0 7.07'/><path d='M19.07 4.93a10 10 0 0 1 0 14.14'/></svg>") center / contain no-repeat;
}
.listen-btn.is-playing .listen-icon {
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><rect x='6' y='5' width='4' height='14'/><rect x='14' y='5' width='4' height='14'/></svg>") center / contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><rect x='6' y='5' width='4' height='14'/><rect x='14' y='5' width='4' height='14'/></svg>") center / contain no-repeat;
}

.tutor-lede {
  font-size: 1.05em;
  line-height: 1.65;
  font-style: italic;
  color: var(--text);
  border-left: 3px solid var(--accent);
  padding: 0.35rem 0 0.35rem 14px;
  margin: 1.15rem 0 1rem;
}

.tutor-analogy {
  background: var(--surface-2);
  border-radius: var(--r-md);
  padding: 0.85rem 1.05rem 0.95rem;
  margin: 0 0 1.15rem;
}
.tutor-analogy-label {
  display: block;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted-strong);
  margin-bottom: 0.4rem;
}
.tutor-analogy p { font-size: 0.97rem; line-height: 1.6; color: var(--text); }

.tutor-walkthrough { display: grid; gap: 0.75rem; padding: 0; margin: 1.15rem 0; list-style: none; counter-reset: tutor-step; }
.tutor-step {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 0.85rem;
  padding: 0.85rem 1rem 0.95rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.tutor-step-num {
  width: 24px; height: 24px;
  flex: none;
  display: grid; place-items: center;
  background: var(--accent);
  color: #FFF;
  border-radius: 50%;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.78rem;
  font-weight: 700;
  line-height: 1;
}
[data-theme="dark"] .tutor-step-num { color: #15090C; }
.tutor-step-body { min-width: 0; }
.tutor-step-title { font-size: 1.02rem; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 0.25rem; color: var(--text); }
.tutor-step-body p { font-size: 0.94rem; line-height: 1.6; color: var(--text); }

.tutor-confusions {
  margin: 1.15rem 0;
  padding: 0.95rem 1.1rem 1rem;
  background: var(--warn-soft);
  border-left: 3px solid var(--warn);
  border-radius: 0 var(--r-md) var(--r-md) 0;
}
.tutor-confusions-label {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--warn);
  margin-bottom: 0.65rem;
}
.tutor-confusions ul { display: grid; gap: 0.65rem; margin: 0; padding: 0; }
.tutor-confusions li { display: grid; gap: 0.25rem; font-size: 0.94rem; line-height: 1.55; }
.confusion-mistake, .confusion-correction { display: block; }
.confusion-glyph {
  display: inline-block;
  width: 1.05rem;
  font-weight: 800;
  margin-right: 0.4rem;
}
.confusion-x { color: var(--accent); }
.confusion-check { color: var(--good); }
.tutor-warn-icon {
  width: 14px; height: 14px;
  display: inline-block;
  background: currentColor;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2 2 19h20Z'/><path d='M12 9v5'/><circle cx='12' cy='17' r='1' fill='currentColor'/></svg>") center / contain no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2 2 19h20Z'/><path d='M12 9v5'/><circle cx='12' cy='17' r='1' fill='currentColor'/></svg>") center / contain no-repeat;
}

.tutor-images {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
  gap: 0.85rem;
  margin: 1.15rem 0;
}
.tutor-image-card {
  margin: 0;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  padding: 0.7rem;
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}
.tutor-image-card img {
  display: block;
  max-width: 100%;
  height: auto;
  border-radius: 6px;
  background: var(--surface-2);
  cursor: zoom-in;
  transition: transform 180ms ease, box-shadow 180ms ease;
}
.tutor-image-card img:hover {
  transform: scale(1.012);
  box-shadow: var(--shadow-md);
}
.tutor-image-card figcaption {
  font-size: 0.82rem;
  line-height: 1.45;
  color: var(--muted);
}

/* Lightbox / fullscreen image viewer ─── reuses existing modal-bg infra ─── */
.modal-bg.lightbox-bg {
  background: rgba(8, 6, 8, 0.93);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  padding: 0;
  cursor: zoom-out;
}
.lightbox-figure {
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.85rem;
  max-width: 96vw;
  max-height: 96vh;
  cursor: default;
}
.lightbox-figure img {
  display: block;
  max-width: 96vw;
  max-height: 80vh;
  height: auto;
  width: auto;
  object-fit: contain;
  border-radius: 6px;
  background: #FFF;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
}
.lightbox-figure figcaption {
  color: rgba(255, 255, 255, 0.92);
  font-size: 0.95rem;
  line-height: 1.55;
  text-align: center;
  max-width: 64ch;
  padding: 0 1rem;
  font-family: 'Inter', system-ui, sans-serif;
}
.lightbox-close {
  position: fixed;
  top: 1rem;
  right: 1rem;
  width: 2.6rem;
  height: 2.6rem;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.14);
  color: #FFF;
  border: 1px solid rgba(255, 255, 255, 0.22);
  font-size: 1.5rem;
  line-height: 1;
  cursor: pointer;
  z-index: 70;
  transition: background 140ms ease, transform 140ms ease;
}
.lightbox-close:hover { background: rgba(255, 255, 255, 0.24); transform: scale(1.05); }
.lightbox-close:focus-visible { outline: 2px solid #FFF; outline-offset: 2px; }
.lightbox-hint {
  position: fixed;
  bottom: 0.85rem;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.55);
  pointer-events: none;
}
@media (max-width: 540px) {
  .lightbox-figure img { max-height: 70vh; }
  .lightbox-figure figcaption { font-size: 0.85rem; }
}

/* ─── Mermaid diagrams ────────────────────────────────────────────── */
.diagrams { display: grid; gap: 0.85rem; margin: 1.15rem 0; }
.diagram-card {
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
  box-shadow: var(--shadow-sm);
}
.diagram-title {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
}
.diagram-card .mermaid {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 6rem;
  overflow-x: auto;
}
/* While Mermaid is loading or rendering, hide the raw source and show a
   "loading" pseudo-element instead. Once mermaid sets data-processed="true"
   on the div, normal styles take over. */
.diagram-card .mermaid:not([data-processed="true"]) {
  position: relative;
  color: transparent;
  user-select: none;
  white-space: pre;
}
.diagram-card .mermaid:not([data-processed="true"])::before {
  content: 'Loading diagram…';
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  color: var(--muted);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.diagram-card .mermaid svg {
  max-width: 100%;
  height: auto;
}
.diagram-caption {
  font-size: 0.84rem;
  line-height: 1.5;
  color: var(--muted);
  font-style: italic;
}
.diagram-offline {
  font-size: 0.88rem;
  color: var(--muted);
  font-style: italic;
  text-align: center;
  padding: 1.5rem 1rem;
  margin: 0;
  font-family: inherit;
}

/* ─── Animations (Phase 5) ──────────────────────────────────────────
 * Custom inline-SVG animations driven by CSS @keyframes only.
 * Every shape uses CSS variables so dark mode just works. Each card
 * has a play/pause button; folding & spiral also have mode toggles.
 * prefers-reduced-motion freezes everything in its final-frame state.
 * ─────────────────────────────────────────────────────────────────── */
.animations { display: grid; gap: 0.85rem; margin: 1.15rem 0; }
.anim-card {
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
  box-shadow: var(--shadow-sm);
}
.anim-card-head {
  display: flex; align-items: center; justify-content: space-between; gap: 0.6rem;
  flex-wrap: wrap;
}
.anim-controls { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
.anim-mode-switch {
  display: inline-flex; padding: 0.18rem; gap: 0.1rem;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface-2);
}
.anim-mode-switch button {
  padding: 0.3rem 0.7rem;
  border-radius: 999px;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem;
  font-weight: 600;
  letter-spacing: 0.06em;
  color: var(--muted);
  background: transparent;
  border: 0;
  cursor: pointer;
  white-space: nowrap;
  transition: background 140ms ease, color 140ms ease;
}
.anim-mode-switch button:hover:not(.active) { color: var(--text); }
.anim-mode-switch button.active {
  background: var(--surface);
  color: var(--accent);
  box-shadow: var(--shadow-sm);
}
.anim-play-btn {
  width: 1.85rem; height: 1.85rem;
  display: inline-grid; place-items: center;
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--muted-strong);
  border: 1px solid var(--border);
  cursor: pointer;
  font-size: 0.85rem;
  line-height: 1;
  padding: 0;
  transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
}
.anim-play-btn:hover { background: var(--surface-3); color: var(--text); border-color: var(--border-strong); }
.anim-play-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.anim-svg-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0.5rem 0;
  overflow: hidden;
}
.anim-svg {
  max-width: 100%;
  height: auto;
  display: block;
}
.anim-svg.is-paused * { animation-play-state: paused !important; }

/* 1. Lateral folding & tube fusion ────────────────────────────────── */
.anim-folding .anim-tube-left,
.anim-folding .anim-tube-right,
.anim-folding .anim-tube-merged {
  transform-box: view-box;
  transform-origin: center;
}
.anim-folding .anim-tube-left  { animation: anim-fold-left  8s ease-in-out infinite; }
.anim-folding .anim-tube-right { animation: anim-fold-right 8s ease-in-out infinite; }
.anim-folding .anim-tube-merged { animation: anim-fold-merge 8s ease-in-out infinite; }
@keyframes anim-fold-left {
  0%, 5%    { transform: translateX(0);    opacity: 1; }
  55%, 75%  { transform: translateX(60px); opacity: 0; }
  95%, 100% { transform: translateX(0);    opacity: 1; }
}
@keyframes anim-fold-right {
  0%, 5%    { transform: translateX(0);     opacity: 1; }
  55%, 75%  { transform: translateX(-60px); opacity: 0; }
  95%, 100% { transform: translateX(0);     opacity: 1; }
}
@keyframes anim-fold-merge {
  0%, 50%   { opacity: 0; }
  62%, 90%  { opacity: 1; }
  95%, 100% { opacity: 0; }
}

/* 2. D-loop vs L-loop ─────────────────────────────────────────────── */
.anim-looping .anim-loop-bottom {
  transform-box: view-box;
  transform-origin: 160px 110px;
}
.anim-looping[data-mode="d"] .anim-loop-bottom { animation: anim-d-loop 6s ease-in-out infinite; }
.anim-looping[data-mode="l"] .anim-loop-bottom { animation: anim-l-loop 6s ease-in-out infinite; }
@keyframes anim-d-loop {
  0%, 10%   { transform: rotate(0deg); }
  55%, 90%  { transform: rotate(40deg); }
  100%      { transform: rotate(0deg); }
}
@keyframes anim-l-loop {
  0%, 10%   { transform: rotate(0deg); }
  55%, 90%  { transform: rotate(-40deg); }
  100%      { transform: rotate(0deg); }
}

/* 3. AP septum spiral / TGA ───────────────────────────────────────── */
.anim-spiral .anim-septum {
  transform-box: fill-box;
  transform-origin: center;
}
.anim-spiral[data-mode="normal"] .anim-septum-1 { animation: anim-spiral-1 8s ease-in-out infinite; }
.anim-spiral[data-mode="normal"] .anim-septum-2 { animation: anim-spiral-2 8s ease-in-out infinite; }
.anim-spiral[data-mode="normal"] .anim-septum-3 { animation: anim-spiral-3 8s ease-in-out infinite; }
.anim-spiral[data-mode="normal"] .anim-septum-4 { animation: anim-spiral-4 8s ease-in-out infinite; }
.anim-spiral[data-mode="tga"] .anim-septum {
  transform: rotate(0deg);
  animation: none;
}
@keyframes anim-spiral-1 {
  0%, 5%   { transform: rotate(0deg); }
  60%, 95% { transform: rotate(0deg); }
  100%     { transform: rotate(0deg); }
}
@keyframes anim-spiral-2 {
  0%, 5%   { transform: rotate(0deg); }
  60%, 95% { transform: rotate(60deg); }
  100%     { transform: rotate(0deg); }
}
@keyframes anim-spiral-3 {
  0%, 5%   { transform: rotate(0deg); }
  60%, 95% { transform: rotate(120deg); }
  100%     { transform: rotate(0deg); }
}
@keyframes anim-spiral-4 {
  0%, 5%   { transform: rotate(0deg); }
  60%, 95% { transform: rotate(180deg); }
  100%     { transform: rotate(0deg); }
}
.anim-spiral .anim-spiral-labels-normal,
.anim-spiral .anim-spiral-labels-tga { display: none; }
.anim-spiral[data-mode="normal"] .anim-spiral-labels-normal { display: block; }
.anim-spiral[data-mode="tga"]    .anim-spiral-labels-tga    { display: block; }

/* 4. Atrial septation ─────────────────────────────────────────────── */
.anim-septation .anim-primum,
.anim-septation .anim-secundum {
  transform-box: fill-box;
  transform-origin: top center;
  transform: scaleY(0);
}
.anim-septation .anim-primum   { animation: anim-grow-primum   12s ease-in-out infinite; }
.anim-septation .anim-secundum { animation: anim-grow-secundum 12s ease-in-out infinite; }
.anim-septation .anim-foramen-secundum-a,
.anim-septation .anim-foramen-secundum-b { animation: anim-open-foramen 12s ease-in-out infinite; }
.anim-septation .anim-label { opacity: 0; }
.anim-septation .anim-label-primum        { animation: anim-label-fade-primum   12s ease-in-out infinite; }
.anim-septation .anim-label-foramen-sec   { animation: anim-label-fade-foramen  12s ease-in-out infinite; }
.anim-septation .anim-label-secundum      { animation: anim-label-fade-secundum 12s ease-in-out infinite; }
.anim-septation .anim-label-foramen-ovale { animation: anim-label-fade-ovale    12s ease-in-out infinite; }
@keyframes anim-grow-primum {
  0%, 8%    { transform: scaleY(0); }
  28%, 100% { transform: scaleY(1); }
}
@keyframes anim-grow-secundum {
  0%, 55%   { transform: scaleY(0); }
  72%, 100% { transform: scaleY(1); }
}
@keyframes anim-open-foramen {
  0%, 38%   { r: 0; }
  52%, 100% { r: 4; }
}
@keyframes anim-label-fade-primum {
  0%, 22%   { opacity: 0; }
  30%, 100% { opacity: 1; }
}
@keyframes anim-label-fade-foramen {
  0%, 45%   { opacity: 0; }
  55%, 100% { opacity: 1; }
}
@keyframes anim-label-fade-secundum {
  0%, 60%   { opacity: 0; }
  72%, 100% { opacity: 1; }
}
@keyframes anim-label-fade-ovale {
  0%, 72%   { opacity: 0; }
  82%, 100% { opacity: 1; }
}

/* prefers-reduced-motion: freeze every animation in its final frame. */
@media (prefers-reduced-motion: reduce) {
  .anim-svg *, .anim-svg { animation: none !important; }
  .anim-folding .anim-tube-left,
  .anim-folding .anim-tube-right { display: none; }
  .anim-folding .anim-tube-merged { opacity: 1; }
  .anim-looping[data-mode="d"] .anim-loop-bottom { transform: rotate(40deg); }
  .anim-looping[data-mode="l"] .anim-loop-bottom { transform: rotate(-40deg); }
  .anim-spiral[data-mode="normal"] .anim-septum-2 { transform: rotate(60deg); }
  .anim-spiral[data-mode="normal"] .anim-septum-3 { transform: rotate(120deg); }
  .anim-spiral[data-mode="normal"] .anim-septum-4 { transform: rotate(180deg); }
  .anim-septation .anim-primum,
  .anim-septation .anim-secundum { transform: scaleY(1); }
  .anim-septation .anim-foramen-secundum-a,
  .anim-septation .anim-foramen-secundum-b { r: 4; }
  .anim-septation .anim-label { opacity: 1; }
}

@media (max-width: 540px) {
  .explain-block { margin-left: 0; }
}
.progress-bar {
  height: 3px; background: var(--surface-2); border-radius: 999px;
  overflow: hidden; margin-bottom: 1.1rem;
}
.progress-bar .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-hover) 100%);
  border-radius: 999px;
  transition: width 240ms ease;
}
.quiz-card .question {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 500;
  line-height: 1.35;
  letter-spacing: -0.018em;
  margin-bottom: 1.2rem;
}
.options { display: grid; gap: 0.55rem; }
.option {
  position: relative;
  text-align: left;
  padding: 0.85rem 1rem 0.85rem 2.6rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  font-size: 0.95rem;
  font-weight: 500;
  line-height: 1.5;
  transition: border-color 140ms ease, background 140ms ease, transform 100ms ease;
  box-shadow: var(--shadow-sm);
}
.option::before {
  counter-increment: opt;
  content: counter(opt, upper-alpha);
  position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
  width: 1.4rem; height: 1.4rem;
  display: grid; place-items: center;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface-2);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.72rem; font-weight: 600;
  color: var(--muted-strong);
  transition: inherit;
}
.options { counter-reset: opt; }
.option:hover:not([disabled]) { border-color: var(--border-strong); background: var(--surface-2); transform: translateX(2px); }
.option:hover:not([disabled])::before { border-color: var(--border-strong); }
.option.correct {
  border-color: color-mix(in srgb, var(--good) 50%, var(--border));
  background: var(--good-soft);
}
.option.correct::before { background: var(--good); border-color: var(--good); color: #FFF; }
.option.wrong {
  border-color: color-mix(in srgb, var(--warn) 45%, var(--border));
  background: var(--warn-soft);
}
.option.wrong::before { background: var(--warn); border-color: var(--warn); color: #FFF; }
.option[disabled] { cursor: default; }

.feedback {
  margin-top: 1.2rem;
  padding: 1rem 1.1rem;
  border-radius: var(--r-md);
  font-size: 0.94rem;
  line-height: 1.55;
  border: 1px solid var(--border);
  background: var(--surface-2);
}
.feedback.feedback-ok { background: var(--good-soft); border-color: color-mix(in srgb, var(--good) 35%, var(--border)); }
.feedback.feedback-miss { background: var(--warn-soft); border-color: color-mix(in srgb, var(--warn) 35%, var(--border)); }
.feedback .verdict {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  margin-bottom: 0.4rem;
  display: inline-flex; align-items: center; gap: 0.4rem;
}
.feedback .verdict::before {
  content: ''; width: 14px; height: 14px;
  display: inline-block;
  background: currentColor;
  -webkit-mask-size: contain; mask-size: contain;
  -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
}
.feedback.feedback-ok .verdict { color: var(--good); }
.feedback.feedback-ok .verdict::before { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M20 6 9 17l-5-5'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M20 6 9 17l-5-5'/></svg>"); }
.feedback.feedback-miss .verdict { color: var(--warn); }
.feedback.feedback-miss .verdict::before { -webkit-mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M18 6 6 18M6 6l12 12'/></svg>"); mask-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='3' stroke-linecap='round'><path d='M18 6 6 18M6 6l12 12'/></svg>"); }

.results-block {
  background: linear-gradient(180deg, var(--surface) 0%, color-mix(in srgb, var(--accent-soft) 35%, var(--surface)) 100%);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 2rem 1.5rem 1.75rem;
  text-align: center;
  box-shadow: var(--shadow-md), var(--shadow-glow);
}
.results-block .pct {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 4rem;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin: 0.5rem 0 0.25rem;
}
.results-grid {
  display: grid; gap: 0.4rem;
  margin: 1.5rem 0;
  text-align: left;
}
.results-row {
  display: flex; justify-content: space-between; gap: 1rem;
  padding: 0.65rem 0.95rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  font-size: 0.88rem;
  font-weight: 500;
  box-shadow: var(--shadow-sm);
}
.results-row .stat-correct { color: var(--good); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }
.results-row .stat-wrong { color: var(--warn); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; }

/* ---- Mistakes ---- */
.mistake {
  position: relative;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1.1rem 1.25rem;
  background: var(--surface);
  box-shadow: var(--shadow-sm), var(--shadow-glow);
  transition: opacity 200ms ease;
}
.mistake + .mistake { margin-top: 0.7rem; }
.mistake.resolved { opacity: 0.55; }
.mistake .topic {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.68rem; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
}
.mistake h3 {
  margin: 0.35rem 0 0.85rem;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1.4;
}
.mistake .answer-row {
  display: grid; gap: 0.55rem;
  font-size: 0.9rem;
  margin-bottom: 0.85rem;
}
@media (min-width: 640px) {
  .mistake .answer-row { grid-template-columns: 1fr 1fr; }
}
.mistake .answer {
  padding: 0.65rem 0.85rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
}
.mistake .answer.correct-ans { background: var(--good-soft); border-color: color-mix(in srgb, var(--good) 30%, var(--border)); }
.mistake .answer .label {
  display: block;
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--muted); font-size: 0.66rem;
  margin-bottom: 0.2rem;
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
}
.mistake .answer.correct-ans .label { color: var(--good); }
.mistake .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

/* ---- Reference ---- */
.ref-section + .ref-section { margin-top: 2.5rem; }
.ref-section .ref-head {
  display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap;
  gap: 0.4rem 1rem;
  margin-bottom: 1rem;
  padding-bottom: 0.55rem;
  border-bottom: 1px solid var(--border);
}
.ref-section .ref-head h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.018em;
}
.ref-section .ref-head .meta { font-size: 0.84rem; color: var(--muted); }

.ref-grid { display: grid; gap: 0.5rem; }
.ref-row {
  display: grid;
  grid-template-columns: 1fr auto 1.4fr;
  align-items: center;
  gap: 1rem;
  padding: 0.85rem 1.1rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  text-align: left;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: border-color 140ms ease, background 140ms ease, transform 100ms ease;
}
.ref-row:hover { border-color: var(--border-strong); background: var(--surface-2); transform: translateX(2px); }
.ref-row .col-label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--muted);
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  font-weight: 600;
  margin-bottom: 0.3rem;
  display: block;
}
.ref-row strong {
  font-weight: 600; color: var(--text);
  background: none; padding: 0;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1rem;
  letter-spacing: -0.01em;
  line-height: 1.35;
}
.ref-row .arrow {
  width: 24px; height: 24px;
  display: grid; place-items: center;
  border-radius: 50%;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 0.95rem;
}
@media (max-width: 540px) {
  .ref-row { grid-template-columns: 1fr; gap: 0.4rem; }
  .ref-row .arrow { display: none; }
}

.anomaly-row {
  display: grid; gap: 0.6rem;
  padding: 1rem 1.15rem;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
  transition: border-color 140ms ease, transform 100ms ease;
}
.anomaly-row:hover { border-color: var(--border-strong); }
.anomaly-row + .anomaly-row { margin-top: 0.55rem; }
.anomaly-row .head { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }
.anomaly-row .head h3 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.1rem;
  font-weight: 600;
  letter-spacing: -0.015em;
}
.anomaly-row .tag {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem; color: var(--muted-strong);
  padding: 0.2rem 0.55rem;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-weight: 500;
  letter-spacing: 0.06em;
}
.anomaly-row .syndrome {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.7rem; color: var(--accent);
  font-weight: 600;
  margin-left: auto;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.anomaly-row .field { display: grid; gap: 0.2rem; font-size: 0.92rem; line-height: 1.5; }
.anomaly-row .field .label {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  color: var(--muted); font-size: 0.66rem;
  text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
}

.mnemonic {
  position: relative;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 1.05rem 1.2rem;
  background:
    linear-gradient(135deg, color-mix(in srgb, var(--accent-soft) 30%, transparent) 0%, transparent 60%),
    var(--surface);
  box-shadow: var(--shadow-sm);
}
.mnemonic + .mnemonic { margin-top: 0.55rem; }
.mnemonic .topic {
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 0.66rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600;
}
.mnemonic .phrase {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 600; font-size: 1.2rem;
  letter-spacing: -0.018em;
  margin: 0.3rem 0 0.45rem;
  color: var(--text);
}
.mnemonic .stands { font-size: 0.92rem; line-height: 1.55; }
.mnemonic .why {
  font-size: 0.84rem;
  color: var(--muted);
  margin-top: 0.55rem;
  padding-top: 0.55rem;
  border-top: 1px dashed var(--border);
  font-style: italic;
}

/* Modal */
/* ─── Auto-update toast (cache invalidation hint) ───────────────────
 * Slides in from the bottom on stale-cache detection. Designed for
 * non-technical users so they never have to think about hard-refresh. */
#updateToast {
  position: fixed;
  left: 50%;
  bottom: max(1rem, env(safe-area-inset-bottom));
  transform: translate(-50%, 120%);
  z-index: 8500;
  display: flex;
  align-items: center;
  gap: 0.7rem;
  padding: 0.55rem 0.5rem 0.55rem 1rem;
  background: var(--surface);
  border: 1px solid color-mix(in srgb, var(--accent) 35%, var(--border));
  border-radius: 999px;
  box-shadow: var(--shadow-lg);
  font-size: 0.88rem;
  max-width: calc(100vw - 2rem);
  transition: transform 240ms cubic-bezier(0.32, 0.72, 0.35, 1.1), opacity 240ms ease;
  opacity: 0;
}
#updateToast.is-visible {
  transform: translate(-50%, 0);
  opacity: 1;
}
#updateToast .update-icon {
  width: 18px; height: 18px; flex: none;
  display: inline-block;
  background: var(--accent);
  border-radius: 50%;
  position: relative;
}
#updateToast .update-icon::after {
  content: '';
  position: absolute;
  inset: 0;
  background: #FFF;
  -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'><polyline points='23 4 23 10 17 10'/><path d='M20.49 15A9 9 0 1 1 18 5.3L23 10'/></svg>") center / 12px no-repeat;
          mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'><polyline points='23 4 23 10 17 10'/><path d='M20.49 15A9 9 0 1 1 18 5.3L23 10'/></svg>") center / 12px no-repeat;
}
#updateToast .update-text { color: var(--text); line-height: 1.35; }
#updateToast .update-text strong { color: var(--text); font-weight: 600; }
#updateToast .update-reload {
  background: var(--accent);
  color: #FFF;
  border: none;
  padding: 0.45rem 0.95rem;
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: filter 140ms ease;
}
[data-theme="dark"] #updateToast .update-reload { color: #15090C; }
#updateToast .update-reload:hover { filter: brightness(1.05); }
#updateToast .update-dismiss {
  width: 1.7rem; height: 1.7rem;
  display: inline-grid; place-items: center;
  border: none; background: transparent;
  color: var(--muted); cursor: pointer;
  font-size: 1.1rem; line-height: 1;
  border-radius: 999px;
  flex: none;
}
#updateToast .update-dismiss:hover { background: var(--surface-2); color: var(--text); }
@media (max-width: 540px) {
  #updateToast { font-size: 0.82rem; gap: 0.5rem; padding: 0.5rem 0.4rem 0.5rem 0.85rem; }
  #updateToast .update-text { max-width: 12rem; }
}

.modal-bg {
  position: fixed; inset: 0; z-index: 60;
  background: color-mix(in srgb, var(--text) 35%, transparent);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: grid; place-items: center;
  padding: 1rem;
  animation: fadeIn 160ms ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1.5rem 1.6rem 1.4rem;
  max-width: 28rem;
  width: 100%;
  box-shadow: var(--shadow-lg);
  animation: scaleIn 180ms ease;
}
@keyframes scaleIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }
.modal h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 0.55rem;
}
.modal .actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.2rem; }

/* Empty state */
.empty {
  text-align: center;
  padding: 3.5rem 1.5rem;
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--r-lg);
  color: var(--muted);
}
.empty .ic-mark {
  width: 44px; height: 44px;
  margin: 0 auto 0.85rem;
  display: grid; place-items: center;
  background: var(--accent-soft);
  border-radius: 50%;
  color: var(--accent);
}
.empty .ic-mark svg { width: 22px; height: 22px; }
.empty h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 0.5rem;
}
.empty p { color: var(--muted); }

@media print {
  .site-header, nav.mobile-tabs, .read-toggle, .btn, button { display: none !important; }
  body { background: white; color: black; padding: 0; background-image: none; }
  main { padding: 0; }
  .panel, .note, .callout, .mnemonic, .anomaly-row { break-inside: avoid; border: 1px solid #ccc !important; background: white !important; box-shadow: none !important; }
}
</style>

  <div id="modalRoot"></div>

  <script>

    const STORE_KEY = 'heart-development-study-app-v2';
    // Bumped every time the deployed build changes. Pair with version.txt at

    const APP_VERSION = '2026-05-08-audio-tts-fixes-2';

    const tabIcons = {
