      quizLength: 'all',        // '10' | '25' | '50' | '100' | 'all'
      tutorMode: {},            // sectionId -> boolean (default: tutor mode ON for all sections)
      tts: {                    // text-to-speech preferences
        voice: '',              // saved voice name; empty string = system default
        rate:  1.0,             // 0.7 .. 1.6
        autoReadFlip: false     // auto-speak flashcard content on flip
      }
    };

    // Default behaviour: if a section's tutorMode hasn't been set yet, treat as ON.
    function tutorModeFor(sectionId) {
      const v = state.tutorMode?.[sectionId];
      return v === undefined ? true : !!v;
    }

    function loadState() {
      let result;
      try {
        const raw = localStorage.getItem(STORE_KEY);
        result = !raw ? migrateLegacy() : mergeState(structuredClone(defaultState), JSON.parse(raw));
      } catch (e) { result = structuredClone(defaultState); }
      // Drop orphaned mistakes whose questionId no longer matches a current MCQ.
      // The v2 quiz bank changed when the app moved to vignette-style questions,
      // so legacy mistakes from old IDs are useless and clutter the log.
      if (Array.isArray(result.mistakes)) {
        const validIds = new Set(mcqs.map(q => q.id));
        result.mistakes = result.mistakes.filter(m => !m.questionId || validIds.has(m.questionId));
      }
      return result;
    }

    function migrateLegacy() {
      // Pull anything from the v1 schema if present (older "heart-development-study-app-v1" key).
      const base = structuredClone(defaultState);
      try {
        const raw = localStorage.getItem('heart-development-study-app-v1');
        if (!raw) return base;
        const old = JSON.parse(raw);
        base.theme = old.theme || base.theme;
        base.readSections = old.readSections || [];
        if (old.flashcards?.known) old.flashcards.known.forEach(id => base.flashStatus[id] = 'known');
        if (old.flashcards?.review) old.flashcards.review.forEach(id => { if (base.flashStatus[id] !== 'known') base.flashStatus[id] = 'review'; });
        if (Array.isArray(old.mistakes)) base.mistakes = old.mistakes.slice(0, 200);
      } catch (e) { /* ignore */ }
      return base;
    }

    function mergeState(base, saved) {
      for (const k of Object.keys(saved || {})) {
        if (saved[k] && typeof saved[k] === 'object' && !Array.isArray(saved[k]) && base[k] && typeof base[k] === 'object' && !Array.isArray(base[k])) {
          base[k] = mergeState(base[k], saved[k]);
        } else {
          base[k] = saved[k];
        }
      }
      return base;
    }

    function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

    let state = loadState();
    let activeTab = state.lastTab || 'notes';
    let searchQuery = '';

    // Per-view ephemeral state
    let flash = { topic: 'All', flipped: false, queue: [], index: 0 };
    let quiz = { topic: 'All', difficulty: 'All', index: 0, order: [], answers: {}, complete: false, reviewIds: null };

    const root = document.getElementById('app');
    const tabsEl = document.getElementById('tabs');
    const mobileTabsEl = document.getElementById('mobileTabs');
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    const themeToggle = document.getElementById('themeToggle');
    const modalRoot = document.getElementById('modalRoot');

    /* ---------- helpers ---------- */
    function escapeHtml(s) {
      return String(s ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }
    function md(s) {
      // Render bold ** ** and arrows.
      return escapeHtml(s).replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function textOfSection(section) {
      const t = section.tutor || {};
      const walkthrough = (t.walkthrough || []).flatMap(w => [w.title || '', w.body || '']);
      const confusions = (t.confusions || []).flatMap(c => [c.mistake || '', c.correction || '']);
      const images = (section.images || []).flatMap(im => [im.caption || '', im.alt || '']);
      return [
        section.title,
        ...(section.lead || []),
        ...section.callouts.map(c => `${c.type} ${c.text}`),
        ...section.subsections.flatMap(s => [s.title, ...s.bullets]),
        section.clinical?.title || '',
        section.clinical?.body || '',
        ...(section.clinical?.bullets || []),
        // Tutor content
        t.plainEnglish || '',
        t.analogy || '',
        ...walkthrough,
        ...confusions,
        t.clinicalHook || '',
        ...images
      ].join(' ').replace(/\*\*/g, '');
    }

    /* ---------- nav ---------- */
    const SUN_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`;
    const MOON_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

    function renderNav() {
      const desktop = tabs.map(t => `<button data-tab="${t.id}" class="${activeTab === t.id ? 'active' : ''}">${t.label}</button>`).join('');
      tabsEl.innerHTML = desktop;
      const mobile = `<div class="row">${tabs.map(t => `<button data-tab="${t.id}" class="${activeTab === t.id ? 'active' : ''}"><span class="ic">${tabIcons[t.id] || ''}</span><span>${t.label}</span></button>`).join('')}</div>`;
      mobileTabsEl.innerHTML = mobile;
      themeToggle.innerHTML = state.theme === 'dark' ? SUN_ICON : MOON_ICON;
    }

    function switchTab(id, opts = {}) {
      // Stop any speech when leaving the current tab — don't carry audio between sections.
      if (id !== activeTab) tts.stop();
      activeTab = id;
      state.lastTab = id;
      saveState();
      render();
      requestAnimationFrame(() => {
        if (opts.target) {
          document.getElementById(opts.target)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          window.scrollTo({ top: 0, behavior: 'instant' });
        }
      });
    }

    /* ---------- render ---------- */
    /* ─── Text-to-speech (free, browser-native) ─────────────────────── */
    const tts = {
      voices: [],
      activeId: null,        // identifier for the thing currently speaking, used for UI sync
      onIdleSubscribers: new Set(),
      ready() { return typeof window !== 'undefined' && 'speechSynthesis' in window; },
      _loadVoices() {
        if (!this.ready()) return;
        this.voices = (window.speechSynthesis.getVoices() || []).slice();
      },
      init() {
        if (!this.ready()) return;
        this._loadVoices();
        window.speechSynthesis.addEventListener?.('voiceschanged', () => {
          this._loadVoices();
          // Re-render notes if user is on notes tab — voices may have just become available.
          if (activeTab === 'notes') renderNav();
        });
      },
      isSpeaking() { return this.ready() && (window.speechSynthesis.speaking || window.speechSynthesis.pending); },
      speak(text, opts = {}) {
        if (!this.ready() || !text) return;
        this.stop();
        const u = new SpeechSynthesisUtterance(text);
        u.rate  = Math.max(0.5, Math.min(2, opts.rate ?? state.tts?.rate ?? 1));
        u.pitch = 1;
        const vName = state.tts?.voice;
        if (vName) {
          const v = this.voices.find(v => v.name === vName);
          if (v) u.voice = v;
        }
        u.onstart = () => { this.activeId = opts.id || 'speaking'; opts.onStart?.(); };
        u.onend = u.onerror = () => {
          this.activeId = null;
          opts.onEnd?.();
          this.onIdleSubscribers.forEach(fn => { try { fn(); } catch (e) {} });
        };
        try { window.speechSynthesis.speak(u); } catch (e) { console.warn('TTS speak failed', e); }
      },
      stop() {
        if (!this.ready()) return;
        try { window.speechSynthesis.cancel(); } catch (e) {}
        this.activeId = null;
      }
    };

    // Strip Markdown / arrows / quotes / bracket noise so TTS reads cleanly.
    function spokenify(s) {
      return String(s || '')
        .replace(/\*\*/g, '')
        .replace(/[`_]/g, '')
        .replace(/→/g, ' becomes ')
        .replace(/[\[\]]/g, '')
        .replace(/—/g, ', ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function spokenTextOfSection(section) {
      const parts = [];
      if (section.title) parts.push(section.title + '.');
      const t = section.tutor || {};
      if (t.plainEnglish) parts.push(spokenify(t.plainEnglish));
      if (t.analogy) parts.push('Think of it like… ' + spokenify(t.analogy));
      if (Array.isArray(section.lead)) section.lead.forEach(p => parts.push(spokenify(p)));
      (t.walkthrough || []).forEach(w => {
        parts.push(`Step ${w.step}: ${spokenify(w.title)}.`);
        if (w.body) parts.push(spokenify(w.body));
      });
      if ((t.confusions || []).length) {
        parts.push('Common mix-ups.');
        t.confusions.forEach(c => {
          parts.push('Mistake: ' + spokenify(c.mistake));
          parts.push('Correction: ' + spokenify(c.correction));
        });
      }
      if (t.clinicalHook) parts.push('Clinical hook. ' + spokenify(t.clinicalHook));
      // Fallback to bullets if no tutor content.
      if (parts.length <= 1) {
        section.subsections?.forEach(sub => {
          parts.push(spokenify(sub.title) + '.');
          sub.bullets?.forEach(b => parts.push(spokenify(b)));
        });
      }
      return parts.join(' ');
    }

    function spokenTextOfFlashcard(card, side) {
      // side = 'front' | 'back'
      return spokenify(side === 'back' ? card.back : card.front);
    }

    tts.init();

    function updateListenButton(btn, playing) {
      if (!btn) return;
      btn.classList.toggle('is-playing', playing);
      const label = btn.querySelector('.listen-label');
      if (label) label.textContent = playing ? 'Stop' : 'Listen';
      btn.setAttribute('aria-label', playing ? 'Stop reading aloud' : 'Listen to this section');
    }

    // Trim noisy voice names down to the bit users actually pick by.
    // Examples:
    //   "Microsoft Aarti Indic Online (Natural) - English (India)" → "Aarti Indic"
    //   "Google US English"                                        → "Google US English"
    //   "Samantha"                                                 → "Samantha"
    function prettyVoiceName(v) {
      let n = String(v.name || '');
      n = n.replace(/^Microsoft\s+/i, '')
           .replace(/\s+Multilingual/ig, '')
           .replace(/\s+Online/ig, '')
           .replace(/\s+Turbo/ig, '')
           .replace(/\s*\(Natural\)/ig, '')
           .replace(/\s*-\s*English[^—-]*$/i, '')
           .replace(/\s+/g, ' ')
           .trim();
      return n || v.name;
    }

    function openSettingsModal() {
      const v = state.tts.voice || '';
      const r = state.tts.rate || 1;
      const ar = !!state.tts.autoReadFlip;
      const supported = tts.ready();
      // Filter to English voices only — non-English voices reading English
      // medical text sound bizarre, and the dropdown is huge on Windows
      // where Edge installs ~100 cloud voices.
      const sorted = (tts.voices || [])
        .filter(v2 => (v2.lang || '').toLowerCase().startsWith('en'))
        .sort((a, b) => (a.name || '').localeCompare(b.name || ''));
      // Split into "Local" (reliable, downloadable) and "Online" (cloud — often
      // silently fall back to system default in non-Edge browsers, which is
      // why "I picked a voice but it sounded the same".
      const isOnline = (v2) => /\bOnline\b|\(Natural\)/i.test(v2.name) || v2.localService === false;
      const local = sorted.filter(v2 => !isOnline(v2));
      const online = sorted.filter(isOnline);
      const opt = (v2) => `<option value="${escapeHtml(v2.name)}" ${v === v2.name ? 'selected' : ''}>${escapeHtml(prettyVoiceName(v2))} · ${escapeHtml(v2.lang || '')}</option>`;
      const localOptions = local.map(opt).join('');
      const onlineOptions = online.map(opt).join('');
      const html = `
        <h2>Settings</h2>
        <p class="muted small">Audio playback uses your device's built-in voices — no internet or account needed.</p>
        ${!supported ? `<p class="muted small" style="margin-top:0.85rem">Your browser does not support text-to-speech. Listen buttons are hidden.</p>` : `
          <div style="margin-top:1rem; display:grid; gap:0.95rem">
            <label class="field">Voice
              <select data-action="settings-voice" style="max-width:100%">
                <option value="">System default</option>
                ${local.length ? `<optgroup label="Local voices (always work)">${localOptions}</optgroup>` : ''}
                ${online.length ? `<optgroup label="Online voices (may fall back silently)">${onlineOptions}</optgroup>` : ''}
              </select>
            </label>
            <label class="field">Speed: <span data-rate-display>${r.toFixed(1)}×</span>
              <input type="range" min="0.7" max="2" step="0.05" value="${r}" data-action="settings-rate" style="accent-color: var(--accent)">
            </label>
            <label style="display:flex; align-items:center; gap:0.55rem; cursor:pointer">
              <input type="checkbox" data-action="settings-autoread" ${ar ? 'checked' : ''} style="accent-color: var(--accent)">
              <span style="font-size:0.92rem">Auto-read flashcards on flip</span>
            </label>
            <button class="btn" data-action="settings-test" style="justify-self:start">Test voice</button>
            <p class="muted tiny" style="margin: 0; line-height: 1.5">
              Tip: pick a voice from <strong>Local voices</strong> first. The Microsoft "Online (Natural)" voices are cloud-based and may silently fall back to your system default in this browser — picking one of those and hearing no change is the most common reason audio doesn't switch.
            </p>
          </div>
        `}
        <div class="actions">
          <button class="btn btn-primary" data-action="modal-close">Done</button>
        </div>`;
      openModal(html);
    }

    function render() {
      document.body.dataset.theme = state.theme;
      renderNav();
      const r = ({
        notes: renderNotes,
        flashcards: renderFlashcards,
        quiz: renderQuiz,
        mistakes: renderMistakes,
        reference: renderReference
      })[activeTab] || renderNotes;
      root.innerHTML = r();
      renderSearchResults();
      // Lazy-load Mermaid + render diagrams when notes tab is active.
      if (activeTab === 'notes') renderMermaidDiagrams();
    }

    /* ---------- Mermaid (lazy) ──────────────────────────────────── */
    let mermaidPromise = null;
    let mermaidFailed = false;

    function loadMermaid() {
      if (mermaidFailed) return Promise.resolve(null);
      if (mermaidPromise) return mermaidPromise;
      mermaidPromise = (async () => {
        try {
          const mod = await import('https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs');
          return mod.default || mod;
        } catch (e) {
          console.warn('Mermaid load failed:', e);
          mermaidFailed = true;
          return null;
        }
      })();
      return mermaidPromise;
    }

    function getMermaidThemeVars() {
      // data-theme lives on <body>, so read CSS vars from there — the html
      // element only ever has the :root (light) values.
      const cs = getComputedStyle(document.body);
      const v = (name) => cs.getPropertyValue(name).trim();
      return {
        primaryColor:        v('--surface'),
        primaryTextColor:    v('--text'),
        primaryBorderColor:  v('--border-strong'),
        lineColor:           v('--muted'),
        secondaryColor:      v('--surface-2'),
        tertiaryColor:       v('--accent-soft'),
        background:          v('--surface'),
        mainBkg:             v('--surface'),
        nodeBorder:          v('--border-strong'),
        clusterBkg:          v('--surface-2'),
        edgeLabelBackground: v('--surface-2'),
        textColor:           v('--text'),
        fontFamily:          'Inter, system-ui, -apple-system, "Segoe UI", sans-serif',
        fontSize:            '14px',
        // Timeline / mindmap colour scale.
        cScale0: v('--accent'),
        cScale1: v('--gold'),
        cScale2: v('--good')
      };
    }

    let mermaidRenderToken = 0;
    async function renderMermaidDiagrams() {
      const all = document.querySelectorAll('.mermaid');
      const nodes = Array.from(all).filter(n => n.getAttribute('data-processed') !== 'true');
      if (!nodes.length) return;
      const my = ++mermaidRenderToken;
      const m = await loadMermaid();
      if (my !== mermaidRenderToken) return; // a newer render kicked us out
      if (!m) {
        nodes.forEach(n => {
          if (n.getAttribute('data-processed') === 'true') return;
          n.innerHTML = '<p class="diagram-offline">Diagram unavailable offline.</p>';
          n.setAttribute('data-processed', 'true');
        });
        return;
      }
      try {
        m.initialize({ startOnLoad: false, securityLevel: 'loose', theme: 'base', themeVariables: getMermaidThemeVars() });
        await m.run({ nodes });
      } catch (e) {
        console.warn('Mermaid render error:', e);
        nodes.forEach(n => {
          if (n.getAttribute('data-processed') === 'true') return;
          n.innerHTML = '<p class="diagram-offline">Diagram failed to render.</p>';
          n.setAttribute('data-processed', 'true');
        });
      }
    }

    /* ---------- Notes ---------- */
    function calloutKind(type) {
      const t = (type || '').toLowerCase();
      if (t.includes('high-yield')) return { cls: 'callout-yield', clean: 'High-Yield' };
      if (t.includes('cool fact')) return { cls: 'callout-fact', clean: 'Cool Fact' };
      if (t.includes('memory'))    return { cls: 'callout-trick', clean: 'Memory Trick' };
      return { cls: 'callout-yield', clean: type.replace(/^[^A-Za-z]+/, '') || 'Note' };
    }

    function renderNotes() {
      const visible = !searchQuery
        ? notes
        : notes.filter(n => textOfSection(n).toLowerCase().includes(searchQuery.toLowerCase()));
      const readCount = notes.filter(n => state.readSections.includes(n.id)).length;
      const tocItems = notes.map(n => {
        const isRead = state.readSections.includes(n.id);
        return `<li><button data-action="jump-note" data-target="${n.id}" class="${isRead ? 'read' : ''}">
          <span>${escapeHtml(n.title)}</span>
          <span class="check" aria-hidden="true"></span>
        </button></li>`;
      }).join('');
      const body = visible.length
        ? visible.map(renderNote).join('')
        : `<div class="empty">
            <span class="ic-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
            <h2>No notes match "${escapeHtml(searchQuery)}"</h2>
            <p>Try a different word or clear the search.</p>
          </div>`;
      return `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Embryology · Lecture notes</span>
            <h1>Development of the Heart</h1>
            <span class="meta">${readCount} of ${notes.length} sections read</span>
          </div>
        </div>
        <div class="notes-grid">
          <aside class="notes-toc">
            <h2>Contents</h2>
            <ol>${tocItems}</ol>
          </aside>
          <div>${body}</div>
        </div>`;
    }

    function tutorWordCount(section) {
      const t = section.tutor || {};
      const buckets = [];
      if (t.plainEnglish) buckets.push(t.plainEnglish);
      if (t.analogy) buckets.push(t.analogy);
      if (Array.isArray(section.lead)) buckets.push(...section.lead);
      (t.walkthrough || []).forEach(w => { if (w.title) buckets.push(w.title); if (w.body) buckets.push(w.body); });
      (t.confusions || []).forEach(c => { if (c.mistake) buckets.push(c.mistake); if (c.correction) buckets.push(c.correction); });
      if (t.clinicalHook) buckets.push(t.clinicalHook);
      if (section.clinical?.body) buckets.push(section.clinical.body);
      (section.clinical?.bullets || []).forEach(b => buckets.push(b));
      (section.images || []).forEach(im => { if (im.caption) buckets.push(im.caption); });
      const text = buckets.join(' ').replace(/\*\*/g, '');
      return text.split(/\s+/).filter(Boolean).length;
    }

    function renderNote(section) {
      const isRead = state.readSections.includes(section.id);
      const tutorOn = tutorModeFor(section.id);
      const t = section.tutor || {};
      const idx = notes.findIndex(n => n.id === section.id) + 1;

      // ─── Always-visible: callouts (preview cards) and subsections (bullet recap) ───
      const calloutCls = section.callouts.length === 2 ? 'callouts two' : 'callouts';
      const callouts = section.callouts.length ? `
        <div class="${calloutCls}">
          ${section.callouts.map(c => {
            const k = calloutKind(c.type);
            return `
              <div class="callout ${k.cls}">
                <span class="label"><span class="ic-leaf" aria-hidden="true"></span>${escapeHtml(k.clean)}</span>
                <span class="text">${md(c.text)}</span>
              </div>`;
          }).join('')}
        </div>` : '';

      const subs = section.subsections.map(sub => `
        <div class="subsection">
          <h3>${escapeHtml(sub.title)}</h3>
          <ul>${sub.bullets.map(b => `<li>${md(b)}</li>`).join('')}</ul>
        </div>`).join('');

      // ─── Tutor-only blocks (hidden when toggle off) ───
      const lede = t.plainEnglish ? `
        <p class="tutor-lede">${md(t.plainEnglish)}</p>` : '';

      const analogy = t.analogy ? `
        <div class="tutor-analogy">
          <span class="tutor-analogy-label">Think of it like…</span>
          <p>${md(t.analogy)}</p>
        </div>` : '';

      const lead = Array.isArray(section.lead) && section.lead.length ? `
        <div class="note-lead">
          ${section.lead.map(p => `<p>${md(p)}</p>`).join('')}
        </div>` : '';

      const walkthrough = Array.isArray(t.walkthrough) && t.walkthrough.length ? `
        <ol class="tutor-walkthrough">
          ${t.walkthrough.map(w => `
            <li class="tutor-step">
              <span class="tutor-step-num" aria-hidden="true">${w.step ?? ''}</span>
              <div class="tutor-step-body">
                <h4 class="tutor-step-title font-display">${escapeHtml(w.title || '')}</h4>
                <p>${md(w.body || '')}</p>
              </div>
            </li>`).join('')}
        </ol>` : '';

      const diagram = section.diagram ? `
        <figure class="note-diagram">
          ${section.diagram}
          ${section.diagramCaption ? `<figcaption class="caption">${escapeHtml(section.diagramCaption)}</figcaption>` : ''}
        </figure>` : '';

      const video = section.video ? `
        <a class="note-video" href="${escapeHtml(section.video.link)}" target="_blank" rel="noopener noreferrer">
          <span class="play" aria-hidden="true">▶</span>
          <span>
            <span class="label">Watch</span>
            <span class="title">${escapeHtml(section.video.title)}</span>
            <span class="meta">${escapeHtml(section.video.source || '')}${section.video.meta ? ` · ${escapeHtml(section.video.meta)}` : ''}</span>
          </span>
        </a>` : '';

      const images = Array.isArray(section.images) && section.images.length ? `
        <div class="tutor-images">
          ${section.images.map(im => {
            const src = `assets/lecture-images/${encodeURIComponent(im.file)}`;
            const alt = im.alt || im.caption || '';
            const caption = im.caption || '';
            return `
            <figure class="tutor-image-card">
              <img src="${src}" alt="${escapeHtml(alt)}" loading="lazy"
                   data-action="image-zoom"
                   data-src="${src}"
                   data-caption="${escapeHtml(caption)}"
                   role="button"
                   tabindex="0"
                   title="Click to enlarge">
              <figcaption>${escapeHtml(caption)}</figcaption>
            </figure>`;
          }).join('')}
        </div>` : '';

      const confusions = Array.isArray(t.confusions) && t.confusions.length ? `
        <div class="tutor-confusions">
          <span class="tutor-confusions-label"><span class="tutor-warn-icon" aria-hidden="true"></span>Watch out — common mix-ups</span>
          <ul>
            ${t.confusions.map(c => `
              <li>
                <span class="confusion-mistake"><span class="confusion-glyph confusion-x" aria-hidden="true">✗</span>${md(c.mistake || '')}</span>
                <span class="confusion-correction"><span class="confusion-glyph confusion-check" aria-hidden="true">✓</span>${md(c.correction || '')}</span>
              </li>`).join('')}
          </ul>
        </div>` : '';

      const clinicalHook = t.clinicalHook ? `
        <div class="tutor-clinical-hook">
          <span class="tutor-clinical-hook-label"><span class="stetho" aria-hidden="true"></span>Clinical / exam hook</span>
          <p>${md(t.clinicalHook)}</p>
        </div>` : '';

      const clinical = section.clinical ? `
        <div class="note-clinical">
          <span class="label">Clinical correlation</span>
          ${section.clinical.title ? `<h4>${escapeHtml(section.clinical.title)}</h4>` : ''}
          ${section.clinical.body ? `<p>${md(section.clinical.body)}</p>` : ''}
          ${Array.isArray(section.clinical.bullets) && section.clinical.bullets.length ? `<ul>${section.clinical.bullets.map(b => `<li>${md(b)}</li>`).join('')}</ul>` : ''}
        </div>` : '';

      const diagrams = Array.isArray(section.diagrams) && section.diagrams.length ? `
        <div class="diagrams">
          ${section.diagrams.map(d => `
            <div class="diagram-card" data-diagram-type="${escapeHtml(d.type || '')}">
              <div class="diagram-title">${escapeHtml(d.title || '')}</div>
              <div class="mermaid">${escapeHtml(d.mermaid || '')}</div>
              ${d.caption ? `<div class="diagram-caption">${escapeHtml(d.caption)}</div>` : ''}
            </div>`).join('')}
        </div>` : '';

      // Phase 5: custom inline-SVG animations.
      // The SVG is hand-authored and trusted — inserted raw, not escaped.
      const animations = Array.isArray(section.animations) && section.animations.length ? `
        <div class="animations">
          ${section.animations.map(a => {
            const modes = Array.isArray(a.modes) && a.modes.length ? `
              <div class="anim-mode-switch" role="tablist" aria-label="Animation mode">
                ${a.modes.map((m, i) => `<button data-action="anim-set-mode" data-id="${escapeHtml(a.id)}" data-mode="${escapeHtml(m.value)}"${i === 0 ? ' class="active"' : ''}>${escapeHtml(m.label)}</button>`).join('')}
              </div>` : '';
            return `
              <div class="anim-card" data-anim-id="${escapeHtml(a.id)}">
                <div class="anim-card-head">
                  <div class="diagram-title">${escapeHtml(a.title || '')}</div>
                  <div class="anim-controls">
                    ${modes}
                    <button class="anim-play-btn" data-action="anim-toggle-play" data-id="${escapeHtml(a.id)}" aria-pressed="false" aria-label="Pause animation" title="Pause / play">⏸</button>
                  </div>
                </div>
                <div class="anim-svg-wrap">${a.svg}</div>
                ${a.caption ? `<div class="diagram-caption">${escapeHtml(a.caption)}</div>` : ''}
              </div>`;
          }).join('')}
        </div>` : '';

      // Spec render order: lede → analogy → walkthrough → DIAGRAMS → ANIMATIONS → confusions → images → clinical hook.
      // The Looping section's legacy `lead` / inline-svg / video stay adjacent to the new mermaid block.
      const tutorBlock = tutorOn ? `
        ${lede}
        ${analogy}
        ${lead}
        ${walkthrough}
        ${diagrams}
        ${animations}
        ${diagram}
        ${video}
        ${confusions}
        ${images}
      ` : '';
      const tutorTail = tutorOn ? `
        ${clinicalHook}
        ${clinical}
      ` : '';

      // Reading time (only meaningful when tutor mode on).
      const wc = tutorWordCount(section);
      const minutes = Math.max(1, Math.round(wc / 200));
      const readTime = (tutorOn && wc > 30) ? `<span class="reading-time" title="${wc} words at ~200 wpm">~${minutes} min read</span>` : '';

      // Toggle button label.
      const toggleLabel = tutorOn ? 'Tutor mode: ON' : 'Tutor mode: OFF';
      const toggleClass = tutorOn ? 'tutor-toggle is-on' : 'tutor-toggle';
      const hasTutor = !!(t.plainEnglish || t.walkthrough?.length || t.confusions?.length || t.clinicalHook || (section.images && section.images.length));
      const toggleBtn = hasTutor ? `
        <button class="${toggleClass}" data-action="toggle-tutor" data-id="${section.id}" aria-pressed="${tutorOn}" title="Toggle tutor explanations">${toggleLabel}</button>` : '';
      // Listen button — only show if speechSynthesis is available.
      const listenId = 'listen-section-' + section.id;
      const listenBtn = tts.ready() ? `
        <button class="listen-btn" data-action="listen-section" data-id="${section.id}" data-listen-id="${listenId}" aria-label="Listen to this section" title="Listen aloud">
          <span class="listen-icon" aria-hidden="true"></span>
          <span class="listen-label">Listen</span>
        </button>` : '';

      return `
        <article class="note" id="${section.id}">
          <div class="note-head">
            <div class="note-head-text">
              <span class="note-num">Section ${String(idx).padStart(2, '0')}${readTime ? ' · ' : ''}${readTime}</span>
              <h2>${escapeHtml(section.title)}</h2>
            </div>
            <div class="note-head-actions">
              ${listenBtn}
              ${toggleBtn}
              <label class="read-toggle ${isRead ? 'is-read' : ''}">
                <input type="checkbox" data-action="toggle-read" data-id="${section.id}" ${isRead ? 'checked' : ''}>
                <span>${isRead ? 'Read' : 'Mark as read'}</span>
              </label>
            </div>
          </div>
          ${tutorBlock}
          ${callouts}
          ${subs}
          ${tutorTail}
        </article>`;
    }

    /* ---------- Flashcards ---------- */
    function ensureFlashQueue(force = false) {
      const matchTopic = c => flash.topic === 'All' || c.topic === flash.topic;
      const matchSearch = c => !searchQuery || `${c.topic} ${c.front} ${c.back}`.toLowerCase().includes(searchQuery.toLowerCase());
      const pool = flashcards.filter(c => matchTopic(c) && matchSearch(c));
      if (!force && flash.queue.length && flash.queue[flash.index] && pool.some(c => c.id === flash.queue[flash.index])) {
        // Queue still has a current card matching the filter — reuse.
        return;
      }
      // Prioritise: review first, then new, then known.
      const review = pool.filter(c => state.flashStatus[c.id] === 'review');
      const fresh  = pool.filter(c => !state.flashStatus[c.id]);
      const known  = pool.filter(c => state.flashStatus[c.id] === 'known');
      flash.queue = shuffle(review).concat(shuffle(fresh)).concat(shuffle(known)).map(c => c.id);
      flash.index = 0;
      flash.flipped = false;
    }

    function renderFlashcards() {
      ensureFlashQueue();
      const topics = ['All', ...flashcardTopics()];
      const total = flashcards.length;
      const known = Object.values(state.flashStatus).filter(s => s === 'known').length;
      const reviewN = Object.values(state.flashStatus).filter(s => s === 'review').length;
      const head = `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Active recall</span>
            <h1>Flashcards</h1>
            <span class="meta">${known} known · ${reviewN} to review · ${total} total</span>
          </div>
        </div>`;
      if (!flash.queue.length) {
        return `${head}
          <div class="cards-toolbar">
            <label class="field">Topic
              <select data-action="flash-topic">
                ${topics.map(t => `<option ${flash.topic === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
              </select>
            </label>
          </div>
          <div class="empty">
            <span class="ic-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="14" height="12" rx="2"/><path d="M7 2h12a2 2 0 0 1 2 2v12"/></svg></span>
            <h2>No cards in this filter</h2>
            <p>Try a different topic or clear the search.</p>
          </div>`;
      }
      const id = flash.queue[flash.index];
      const card = flashcards.find(c => c.id === id);
      const status = state.flashStatus[card.id] || 'new';
      const statusLabel = status === 'known' ? 'Mastered' : status === 'review' ? 'Reviewing' : 'New';
      return `${head}
        <div class="cards-toolbar">
          <label class="field">Topic
            <select data-action="flash-topic">
              ${topics.map(t => `<option ${flash.topic === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
            </select>
          </label>
          <div class="stat">
            <span class="lbl">Position</span>
            <span class="val"><span class="num">${flash.index + 1}</span> <span class="muted">/ ${flash.queue.length}</span></span>
          </div>
          <div class="stat">
            <span class="lbl">Status</span>
            <span class="val">${statusLabel}</span>
          </div>
          <span class="grow"></span>
          <button class="btn btn-sm" data-action="flash-shuffle">Shuffle</button>
          <button class="btn btn-sm btn-ghost btn-danger" data-action="flash-reset-confirm">Reset</button>
        </div>
        <div class="flashcard ${flash.flipped ? 'is-back' : ''}" data-action="flash-flip" tabindex="0" role="button" aria-label="Flip card">
          <span class="topic-tag">${escapeHtml(card.topic)}</span>
          <span class="side-tag">${flash.flipped ? 'Answer' : 'Question'}</span>
          <div class="content">${md(flash.flipped ? card.back : card.front)}</div>
          <div class="hint">${flash.flipped ? 'Tap to flip back' : 'Tap to reveal'}</div>
        </div>
        <div class="flash-actions">
          <button class="btn btn-lg btn-danger" data-action="flash-rate" data-rating="review">Again</button>
          <button class="btn btn-lg btn-primary" data-action="flash-rate" data-rating="known">Got it</button>
        </div>
        <div class="row-between" style="margin-top:0.6rem">
          <button class="btn btn-sm btn-ghost flash-skip" data-action="flash-skip">Skip card</button>
          <p class="flash-help"><kbd>Space</kbd> flip · <kbd>→</kbd> got it · <kbd>←</kbd> again</p>
        </div>`;
    }

    function flashcardTopics() {
      return Array.from(new Set(flashcards.map(c => c.topic))).sort();
    }

    /* ---------- Quiz ---------- */
    function quizPool() {
      let pool = mcqs;
      if (quiz.topic !== 'All') pool = pool.filter(q => q.topic === quiz.topic);
      if (quiz.difficulty !== 'All') pool = pool.filter(q => q.difficulty === quiz.difficulty);
      return pool;
    }

    function startQuiz(forceReset = false) {
      const pool = quizPool();
      const ids = quiz.reviewIds ? pool.filter(q => quiz.reviewIds.includes(q.id)).map(q => q.id) : pool.map(q => q.id);
      if (forceReset || quiz.order.length === 0 || quiz.order.some(id => !ids.includes(id))) {
        let shuffled = shuffle(ids);
        const len = state.quizLength || 'all';
        if (!quiz.reviewIds && len !== 'all') {
          const n = Number(len);
          if (Number.isFinite(n) && n > 0) shuffled = shuffled.slice(0, n);
        }
        quiz.order = shuffled;
        quiz.index = 0;
        quiz.answers = {};
        quiz.complete = false;
      }
    }

    function quizQuestions() {
      return quiz.order.map(id => mcqs.find(q => q.id === id)).filter(Boolean);
    }

    function renderQuiz() {
      startQuiz();
      const topics = ['All', ...quizTopics()];
      const difficulties = ['All', 'Easy', 'Medium', 'Hard'];
      const questions = quizQuestions();
      const total = questions.length;
      const filterChips = [];
      if (quiz.topic !== 'All') filterChips.push(escapeHtml(quiz.topic));
      if (quiz.difficulty !== 'All') filterChips.push(escapeHtml(quiz.difficulty));
      const head = `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Vignette quiz · USMLE-style</span>
            <h1>Quiz</h1>
            <span class="meta">${mcqs.length} clinical vignettes${filterChips.length ? ' · ' + filterChips.join(' · ') : ''}</span>
          </div>
        </div>`;
      if (!total) {
        return `${head}<div class="empty"><h2>No questions match your filter</h2><p>Pick a different topic or difficulty.</p></div>`;
      }
      const answered = Object.keys(quiz.answers).length;
      const score = Object.values(quiz.answers).filter(a => a.correct).length;
      const lengthOpts = ['10', '25', '50', 'all'];
      const lengthVal = state.quizLength || 'all';
      const toolbar = `
        <div class="quiz-toolbar">
          <label class="field">Topic
            <select data-action="quiz-topic">
              ${topics.map(t => `<option ${quiz.topic === t ? 'selected' : ''}>${escapeHtml(t)}</option>`).join('')}
            </select>
          </label>
          <label class="field">Difficulty
            <select data-action="quiz-difficulty">
              ${difficulties.map(d => `<option ${quiz.difficulty === d ? 'selected' : ''}>${escapeHtml(d)}</option>`).join('')}
            </select>
          </label>
          <label class="field">Length
            <select data-action="quiz-length">
              ${lengthOpts.map(v => `<option value="${v}" ${lengthVal === v ? 'selected' : ''}>${v === 'all' ? 'All' : v + ' Q'}</option>`).join('')}
            </select>
          </label>
          <span class="grow"></span>
          <div class="quiz-meta">
            <span class="lbl">${answered ? 'Score' : 'Questions'}</span>
            <span class="val">${answered ? `<span class="num">${score}</span> <span class="muted">/ ${answered}</span>` : `<span class="num">${total}</span>`}</span>
          </div>
        </div>`;
      if (quiz.complete || quiz.index >= total) return head + toolbar + renderQuizResults(questions);
      const q = questions[quiz.index];
      const ans = quiz.answers[q.id];
      const correctIdx = q.answer;
      const explanationIsObject = ans !== undefined && q.explanation && typeof q.explanation === 'object';
      const optionsHtml = q.options.map((opt, i) => {
        let cls = '';
        if (ans !== undefined) {
          if (i === correctIdx) cls = 'correct';
          else if (i === ans.selected) cls = 'wrong';
        }
        const optionBtn = `<button class="option ${cls}" data-action="quiz-answer" data-index="${i}" ${ans !== undefined ? 'disabled' : ''}>${escapeHtml(opt)}</button>`;
        if (!explanationIsObject) return optionBtn;
        if (i === correctIdx) {
          return optionBtn + `
            <div class="explain-block correct-explain">
              <span class="explain-label"><span class="explain-icon explain-check" aria-hidden="true"></span>Why this is correct</span>
              <p>${md(q.explanation.correct || '')}</p>
            </div>`;
        }
        const dist = q.explanation.distractors?.[i];
        if (!dist) return optionBtn;
        return optionBtn + `
          <div class="explain-block wrong-explain">
            <span class="explain-label"><span class="explain-icon explain-x" aria-hidden="true"></span>Why this is wrong</span>
            <p>${md(dist)}</p>
          </div>`;
      }).join('');
      const progressPct = Math.round(((quiz.index + (ans !== undefined ? 1 : 0)) / total) * 100);
      const navRow = ans === undefined ? '' : `
        <div class="row-between" style="margin-top:1.1rem">
          <span class="muted small">Question ${quiz.index + 1} of ${total}</span>
          <button class="btn btn-primary btn-lg" data-action="quiz-next">${quiz.index + 1 === total ? 'See results' : 'Next question →'}</button>
        </div>`;
      const legacyFeedback = (ans !== undefined && !explanationIsObject) ? `
        <div class="feedback ${ans.correct ? 'feedback-ok' : 'feedback-miss'}">
          <div class="verdict">${ans.correct ? 'Correct' : 'Not quite'}</div>
          <div>${md(q.explanation || '')}</div>
        </div>` : '';
      const answeredCount = Object.keys(quiz.answers).length;
      const diff = q.difficulty || '';
      const diffClass = diff ? `difficulty-chip diff-${diff.toLowerCase()}` : '';
      return head + toolbar + `
        <article class="quiz-card">
          <div class="quiz-progress">
            <span class="progress-text">Question ${quiz.index + 1} of ${total}</span>
            <div class="chip-row">
              <span class="topic-chip">${escapeHtml(q.topic)}</span>
              ${diff ? `<span class="${diffClass}">${escapeHtml(diff)}</span>` : ''}
            </div>
          </div>
          <div class="progress-bar"><div class="fill" style="width:${progressPct}%"></div></div>
          <div class="question">${md(q.q)}</div>
          <div class="options">${optionsHtml}</div>
          ${legacyFeedback}
          ${navRow}
          ${total > 10 && answeredCount > 0 && !quiz.complete ? `<div class="row-between" style="margin-top:1.1rem;padding-top:0.85rem;border-top:1px dashed var(--border)"><span class="muted tiny">Long set — finish whenever you like</span><button class="btn btn-sm btn-ghost" data-action="quiz-end-now">End quiz now</button></div>` : ''}
        </article>`;
    }

    function renderQuizResults(questions) {
      const total = questions.length;
      const correct = Object.values(quiz.answers).filter(a => a.correct).length;
      const pct = total ? Math.round(correct / total * 100) : 0;
      const wrong = questions.filter(q => quiz.answers[q.id] && !quiz.answers[q.id].correct);
      const byTopic = {};
      questions.forEach(q => {
        const a = quiz.answers[q.id];
        byTopic[q.topic] ||= { c: 0, w: 0 };
        if (a?.correct) byTopic[q.topic].c++; else byTopic[q.topic].w++;
      });
      const message = pct >= 90 ? 'Excellent recall.' : pct >= 75 ? 'Solid. Review what slipped.' : pct >= 50 ? 'Steady progress — work on the misses.' : 'Plenty of room to grow. Review notes and retry.';
      return `
        <div class="results-block">
          <span class="eyebrow">Results</span>
          <div class="pct">${pct}%</div>
          <p class="meta">${correct} of ${total} correct · ${message}</p>
          <div class="results-grid">
            ${Object.entries(byTopic).map(([t, v]) => `
              <div class="results-row">
                <span>${escapeHtml(t)}</span>
                <span><span class="stat-correct">${v.c} correct</span> · <span class="stat-wrong">${v.w} missed</span></span>
              </div>
            `).join('')}
          </div>
          <div class="row-between" style="justify-content:center; gap:0.6rem">
            <button class="btn btn-primary btn-lg" data-action="quiz-retake">Retake</button>
            <button class="btn btn-lg" data-action="quiz-review-wrong" ${wrong.length ? '' : 'disabled'}>Review wrong (${wrong.length})</button>
          </div>
        </div>`;
    }

    function quizTopics() {
      return Array.from(new Set(mcqs.map(q => q.topic))).sort();
    }

    function recordMistake(q, userAnswer, correctAnswer) {
      const id = ++state.lastMistakeId;
      const explanationText = q.explanation && typeof q.explanation === 'object'
        ? (q.explanation.correct || '')
        : (q.explanation || '');
      state.mistakes.unshift({
        id: `m${id}`,
        questionId: q.id,
        topic: q.topic || 'General',
        prompt: q.q || q.front || 'Question',
        userAnswer,
        correctAnswer,
        explanation: explanationText,
        date: new Date().toISOString(),
        resolved: false
      });
      state.mistakes = state.mistakes.slice(0, 200);
      saveState();
    }

    /* ---------- Mistakes ---------- */
    function renderMistakes() {
      const list = (state.mistakes || []).filter(m => {
        if (!searchQuery) return true;
        return `${m.topic} ${m.prompt} ${m.userAnswer} ${m.correctAnswer} ${m.explanation}`.toLowerCase().includes(searchQuery.toLowerCase());
      });
      const open = list.filter(m => !m.resolved).length;
      const head = `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Wrong-answer log</span>
            <h1>Mistakes</h1>
            <span class="meta">${list.length ? `${open} open · ${list.length} total` : 'Empty for now'}</span>
          </div>
          <span class="grow"></span>
          <div class="actions">${list.length ? `<button class="btn btn-sm btn-ghost btn-danger" data-action="clear-mistakes">Clear all</button>` : ''}</div>
        </div>`;
      if (!list.length) {
        return `${head}
          <div class="empty">
            <span class="ic-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></span>
            <h2>No mistakes saved yet</h2>
            <p>Take a quiz — every question you miss is logged here so you can revisit them.</p>
            <p style="margin-top:1.2rem"><button class="btn btn-primary" data-tab="quiz">Start a quiz</button></p>
          </div>`;
      }
      return `${head}
        ${list.map(m => `
          <div class="mistake ${m.resolved ? 'resolved' : ''}">
            <span class="topic">${escapeHtml(m.topic)}</span>
            <h3>${md(m.prompt)}</h3>
            <div class="answer-row">
              <div class="answer"><span class="label">Your answer</span>${md(m.userAnswer || '—')}</div>
              <div class="answer correct-ans"><span class="label">Correct answer</span>${md(m.correctAnswer || '—')}</div>
            </div>
            ${m.explanation ? `<div class="answer" style="margin-bottom:0.85rem"><span class="label">Why</span>${md(m.explanation)}</div>` : ''}
            <div class="actions">
              <button class="btn btn-sm ${m.resolved ? '' : 'btn-good'}" data-action="toggle-mistake" data-id="${escapeHtml(m.id)}">${m.resolved ? 'Reopen' : 'Mark resolved'}</button>
              <button class="btn btn-sm btn-ghost" data-action="delete-mistake" data-id="${escapeHtml(m.id)}">Delete</button>
            </div>
          </div>
        `).join('')}`;
    }

    /* ---------- Reference ---------- */
    function renderReference() {
      const aFilter = searchQuery.toLowerCase();
      const visAnom = !aFilter ? anomalies : anomalies.filter(a => `${a.anomaly} ${a.cause} ${a.features} ${a.syndrome} ${a.tag}`.toLowerCase().includes(aFilter));
      const visDeriv = !aFilter ? derivatives : derivatives.filter(r => r.join(' ').toLowerCase().includes(aFilter));
      const visMnem = !aFilter ? mnemonics : mnemonics.filter(m => `${m.phrase} ${m.stands} ${m.whyItWorks} ${m.topic}`.toLowerCase().includes(aFilter));
      return `
        <div class="page-head">
          <div class="heading-block">
            <span class="eyebrow">Quick-revision tables</span>
            <h1>Reference</h1>
            <span class="meta">High-yield charts for last-minute review</span>
          </div>
        </div>

        <section class="ref-section">
          <div class="ref-head">
            <h2>Embryonic → Adult derivatives</h2>
            <span class="meta">${visDeriv.length} pairs · tap to flip</span>
          </div>
          <div class="ref-grid">
            ${visDeriv.map(r => {
              const idx = derivatives.indexOf(r);
              return `
                <button class="ref-row" data-action="flip-derivative" data-index="${idx}">
                  <span><span class="col-label">Embryonic</span><strong>${escapeHtml(r[0])}</strong></span>
                  <span class="arrow" aria-hidden="true">→</span>
                  <span><span class="col-label">Adult</span><strong>${escapeHtml(r[1])}</strong></span>
                </button>`;
            }).join('') || `<p class="muted small">No matches.</p>`}
          </div>
        </section>

        <section class="ref-section">
          <div class="ref-head">
            <h2>Congenital anomalies</h2>
            <span class="meta">${visAnom.length} entries</span>
          </div>
          <div>
            ${visAnom.map(a => `
              <div class="anomaly-row">
                <div class="head">
                  <h3>${escapeHtml(a.anomaly)}</h3>
                  <span class="tag">${escapeHtml(a.tag)}</span>
                  ${a.syndrome && a.syndrome !== '—' ? `<span class="syndrome">${escapeHtml(a.syndrome)}</span>` : ''}
                </div>
                <div class="field"><span class="label">Cause</span><span>${md(a.cause)}</span></div>
                <div class="field"><span class="label">Features</span><span>${escapeHtml(a.features)}</span></div>
              </div>`).join('') || `<p class="muted small">No matches.</p>`}
          </div>
        </section>

        <section class="ref-section">
          <div class="ref-head">
            <h2>Mnemonics</h2>
            <span class="meta">${visMnem.length} memory aids</span>
          </div>
          <div>
            ${visMnem.map(m => `
              <div class="mnemonic">
                <span class="topic">${escapeHtml(m.topic)}</span>
                <div class="phrase">${md(m.phrase)}</div>
                <div class="stands">${md(m.stands)}</div>
                <div class="why">${escapeHtml(m.whyItWorks)}</div>
              </div>`).join('') || `<p class="muted small">No matches.</p>`}
          </div>
        </section>`;
    }

    /* ---------- Search overlay ---------- */
    function renderSearchResults() {
      if (!searchQuery) {
        searchResults.classList.add('hidden');
        searchResults.innerHTML = '';
        return;
      }
      const q = searchQuery.toLowerCase();
      const out = [];
      notes.forEach(s => { if (textOfSection(s).toLowerCase().includes(q)) out.push({ tab: 'notes', target: s.id, label: 'Note', title: s.title }); });
      flashcards.forEach(c => { if (`${c.topic} ${c.front} ${c.back}`.toLowerCase().includes(q)) out.push({ tab: 'flashcards', label: 'Flashcard', title: c.front }); });
      anomalies.forEach(a => { if (`${a.anomaly} ${a.cause} ${a.features}`.toLowerCase().includes(q)) out.push({ tab: 'reference', label: 'Anomaly', title: a.anomaly }); });
      derivatives.forEach(r => { if (r.join(' ').toLowerCase().includes(q)) out.push({ tab: 'reference', label: 'Derivative', title: `${r[0]} → ${r[1]}` }); });
      mnemonics.forEach(m => { if (`${m.phrase} ${m.stands} ${m.topic}`.toLowerCase().includes(q)) out.push({ tab: 'reference', label: 'Mnemonic', title: m.phrase }); });
      searchResults.classList.remove('hidden');
      searchResults.innerHTML = out.length
        ? out.slice(0, 14).map(r => `<button data-action="search-jump" data-tab="${r.tab}" data-target="${r.target || ''}"><span class="label">${r.label}</span><span class="title">${escapeHtml(r.title)}</span></button>`).join('')
        : `<div style="padding:0.6rem 0.75rem" class="muted small">No matches.</div>`;
    }

    /* ---------- Modal ---------- */
    function openModal(html) {
      modalRoot.innerHTML = `<div class="modal-bg" data-action="modal-bg"><div class="modal" role="dialog" aria-modal="true">${html}</div></div>`;
    }
    function closeModal() { modalRoot.innerHTML = ''; }

    /* ---------- Event delegation ---------- */
    document.addEventListener('click', e => {
      const tabBtn = e.target.closest('[data-tab]');
      if (tabBtn && !tabBtn.dataset.action) {
        switchTab(tabBtn.dataset.tab);
        searchResults.classList.add('hidden');
        return;
      }
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const a = el.dataset.action;

      if (a === 'jump-note') {
        const t = el.dataset.target;
        const targetEl = document.getElementById(t);
        if (targetEl) targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      if (a === 'toggle-tutor') {
        const id = el.dataset.id;
        state.tutorMode ||= {};
        state.tutorMode[id] = !tutorModeFor(id);
        saveState();
        // Re-render notes view in place; preserve scroll-to-section.
        render();
        requestAnimationFrame(() => document.getElementById(id)?.scrollIntoView({ behavior: 'instant', block: 'start' }));
      }
      if (a === 'listen-section') {
        const id = el.dataset.id;
        const listenId = el.dataset.listenId;
        const sec = notes.find(n => n.id === id);
        if (!sec) return;
        // Toggle: if this section is currently being read, stop. Otherwise start.
        if (tts.activeId === listenId) {
          tts.stop();
          updateListenButton(el, false);
          return;
        }
        // Reset any other listen button that thinks it's playing.
        document.querySelectorAll('.listen-btn.is-playing').forEach(b => updateListenButton(b, false));
        const text = spokenTextOfSection(sec);
        if (!text) return;
        updateListenButton(el, true);
        tts.speak(text, {
          id: listenId,
          onEnd: () => updateListenButton(el, false)
        });
      }
      if (a === 'open-settings') openSettingsModal();
      if (a === 'tts-stop-all') tts.stop();
      if (a === 'anim-toggle-play') {
        // Toggle paused state on the corresponding .anim-svg.
        const card = el.closest('.anim-card');
        const svg = card?.querySelector('.anim-svg');
        if (!svg) return;
        const nowPaused = !svg.classList.contains('is-paused');
        svg.classList.toggle('is-paused', nowPaused);
        el.textContent = nowPaused ? '▶' : '⏸';
        el.setAttribute('aria-pressed', String(nowPaused));
        el.setAttribute('aria-label', nowPaused ? 'Play animation' : 'Pause animation');
      }
      if (a === 'anim-set-mode') {
        // Switch the data-mode on the .anim-svg and update the active mode button.
        const card = el.closest('.anim-card');
        const svg = card?.querySelector('.anim-svg');
        const mode = el.dataset.mode;
        if (!svg || !mode) return;
        svg.dataset.mode = mode;
        card.querySelectorAll('.anim-mode-switch button').forEach(b => {
          b.classList.toggle('active', b.dataset.mode === mode);
        });
      }
      if (a === 'image-zoom') {
        const src = el.dataset.src || el.getAttribute('src');
        const alt = el.alt || '';
        const caption = el.dataset.caption || '';
        modalRoot.innerHTML = `
          <div class="modal-bg lightbox-bg" data-action="modal-bg" role="dialog" aria-modal="true" aria-label="Image viewer">
            <button class="lightbox-close" data-action="modal-close" aria-label="Close image viewer (Esc)">×</button>
            <figure class="lightbox-figure">
              <img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}">
              ${caption ? `<figcaption>${escapeHtml(caption)}</figcaption>` : ''}
            </figure>
            <span class="lightbox-hint" aria-hidden="true">Click anywhere or press Esc to close</span>
          </div>`;
        // Move focus into the dialog so Esc / Tab work intuitively.
        requestAnimationFrame(() => modalRoot.querySelector('.lightbox-close')?.focus());
      }
      if (a === 'toggle-theme') {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        saveState(); render();
      }
      if (a === 'flash-flip') {
        flash.flipped = !flash.flipped;
        render();
        if (state.tts.autoReadFlip && tts.ready()) {
          const id = flash.queue[flash.index];
          const card = flashcards.find(c => c.id === id);
          if (card) tts.speak(spokenTextOfFlashcard(card, flash.flipped ? 'back' : 'front'));
        }
      }
      if (a === 'flash-rate') {
        const id = flash.queue[flash.index];
        if (id) {
          state.flashStatus[id] = el.dataset.rating;
          saveState();
        }
        flash.index++;
        flash.flipped = false;
        if (flash.index >= flash.queue.length) ensureFlashQueue(true);
        render();
      }
      if (a === 'flash-skip') {
        flash.index++;
        flash.flipped = false;
        if (flash.index >= flash.queue.length) ensureFlashQueue(true);
        render();
      }
      if (a === 'flash-shuffle') { ensureFlashQueue(true); render(); }
      if (a === 'flash-reset-confirm') {
        openModal(`
          <h2>Reset flashcard progress?</h2>
          <p class="muted small">This clears "Got it" / "Again" status for every card. Your notes, mistakes, and quiz history stay.</p>
          <div class="actions">
            <button class="btn" data-action="modal-close">Cancel</button>
            <button class="btn btn-primary" data-action="flash-reset-confirmed">Reset</button>
          </div>`);
      }
      if (a === 'flash-reset-confirmed') {
        state.flashStatus = {};
        saveState();
        ensureFlashQueue(true);
        closeModal();
        render();
      }
      if (a === 'modal-close' || a === 'modal-bg') {
        if (a === 'modal-bg' && e.target !== el) return; // only outer click
        closeModal();
      }
      if (a === 'quiz-answer') {
        const questions = quizQuestions();
        const q = questions[quiz.index];
        const i = Number(el.dataset.index);
        const correctIdx = q.answer;
        const correct = i === correctIdx;
        quiz.answers[q.id] = { selected: i, correct };
        if (!correct) recordMistake(q, q.options[i], q.options[correctIdx]);
        render();
      }
      if (a === 'quiz-next') {
        const questions = quizQuestions();
        quiz.index++;
        if (quiz.index >= questions.length) quiz.complete = true;
        render();
      }
      if (a === 'quiz-end-now') {
        // Trim the order to questions actually answered, then mark complete.
        const answered = Object.keys(quiz.answers);
        quiz.order = quiz.order.filter(id => answered.includes(id));
        quiz.complete = true;
        render();
      }
      if (a === 'quiz-retake') {
        quiz.reviewIds = null;
        startQuiz(true);
        render();
      }
      if (a === 'quiz-review-wrong') {
        const questions = quizQuestions();
        const wrong = questions.filter(q => quiz.answers[q.id] && !quiz.answers[q.id].correct);
        quiz.reviewIds = wrong.map(q => q.id);
        startQuiz(true);
        render();
      }
      if (a === 'toggle-mistake') {
        const m = state.mistakes.find(x => x.id === el.dataset.id);
        if (m) { m.resolved = !m.resolved; saveState(); render(); }
      }
      if (a === 'delete-mistake') {
        state.mistakes = state.mistakes.filter(x => x.id !== el.dataset.id);
        saveState(); render();
      }
      if (a === 'clear-mistakes') {
        openModal(`
          <h2>Clear all mistakes?</h2>
          <p class="muted small">This removes every saved mistake from this app. You can take a quiz to start a fresh list.</p>
          <div class="actions">
            <button class="btn" data-action="modal-close">Cancel</button>
            <button class="btn btn-primary" data-action="clear-mistakes-confirmed">Clear all</button>
          </div>`);
      }
      if (a === 'clear-mistakes-confirmed') {
        state.mistakes = [];
        saveState(); closeModal(); render();
      }
      if (a === 'flip-derivative') {
        const idx = Number(el.dataset.index);
        const row = derivatives[idx];
        // Swap visually by mutating UI only (toggle dataset)
        const labels = el.querySelectorAll('.col-label');
        const values = el.querySelectorAll('strong');
        if (labels.length === 2 && values.length === 2) {
          [labels[0].textContent, labels[1].textContent] = [labels[1].textContent, labels[0].textContent];
          [values[0].textContent, values[1].textContent] = [values[1].textContent, values[0].textContent];
        }
      }
      if (a === 'search-jump') {
        switchTab(el.dataset.tab, { target: el.dataset.target });
        searchInput.value = '';
        searchQuery = '';
        searchResults.classList.add('hidden');
      }
    });

    document.addEventListener('change', e => {
      const t = e.target;
      if (t.matches('[data-action="toggle-read"]')) {
        const id = t.dataset.id;
        if (t.checked) {
          if (!state.readSections.includes(id)) state.readSections.push(id);
        } else {
          state.readSections = state.readSections.filter(x => x !== id);
        }
        saveState();
        // Update TOC marker + the toggle label without re-rendering the whole page.
        document.querySelectorAll(`.notes-toc button[data-target="${id}"]`).forEach(btn => btn.classList.toggle('read', t.checked));
        const toggleLabel = t.closest('.read-toggle');
        if (toggleLabel) {
          toggleLabel.classList.toggle('is-read', t.checked);
          const span = toggleLabel.querySelector('span:last-child');
          if (span) span.textContent = t.checked ? 'Read' : 'Mark as read';
        }
        const meta = document.querySelector('.page-head .heading-block .meta');
        if (meta) {
          const readCount = notes.filter(n => state.readSections.includes(n.id)).length;
          meta.textContent = `${readCount} of ${notes.length} sections read`;
        }
      }
      if (t.matches('[data-action="flash-topic"]')) {
        flash.topic = t.value;
        flash.queue = [];
        ensureFlashQueue(true);
        render();
      }
      if (t.matches('[data-action="quiz-topic"]')) {
        quiz.topic = t.value;
        quiz.order = []; quiz.index = 0; quiz.answers = {}; quiz.complete = false; quiz.reviewIds = null;
        render();
      }
      if (t.matches('[data-action="quiz-difficulty"]')) {
        quiz.difficulty = t.value;
        quiz.order = []; quiz.index = 0; quiz.answers = {}; quiz.complete = false; quiz.reviewIds = null;
        render();
      }
      if (t.matches('[data-action="quiz-length"]')) {
        state.quizLength = t.value;
        saveState();
        quiz.order = []; quiz.index = 0; quiz.answers = {}; quiz.complete = false; quiz.reviewIds = null;
        render();
      }
      // Settings modal — TTS preferences.
      if (t.matches('[data-action="settings-voice"]')) {
        state.tts.voice = t.value || '';
        saveState();
      }
      if (t.matches('[data-action="settings-rate"]')) {
        state.tts.rate = parseFloat(t.value) || 1;
        saveState();
        const disp = document.querySelector('[data-rate-display]');
        if (disp) disp.textContent = state.tts.rate.toFixed(1) + '×';
      }
      if (t.matches('[data-action="settings-autoread"]')) {
        state.tts.autoReadFlip = !!t.checked;
        saveState();
      }
    });

    // Settings modal — Test voice button (click event, fires from delegate above too).
    document.addEventListener('click', e => {
      if (e.target.closest('[data-action="settings-test"]')) {
        tts.speak("This is the heart embryology study app. Voice test, one two three.", { id: 'test' });
      }
    });

    searchInput.addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderSearchResults();
    });
    searchInput.addEventListener('focus', renderSearchResults);
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap') && !e.target.closest('#searchResults')) {
        searchResults.classList.add('hidden');
      }
    });

    themeToggle.addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      saveState(); render();
    });

    document.getElementById('brandHome')?.addEventListener('click', () => switchTab('notes'));

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') { closeModal(); searchResults.classList.add('hidden'); searchInput.blur(); }
      const tag = document.activeElement?.tagName;
      const typing = ['INPUT', 'TEXTAREA', 'SELECT'].includes(tag);
      if (typing) return;
      // Keyboard activation for clickable images (Enter / Space).
      if ((e.key === 'Enter' || e.key === ' ') && document.activeElement?.matches('[data-action="image-zoom"]')) {
        e.preventDefault();
        document.activeElement.click();
        return;
      }
      if (activeTab === 'flashcards') {
        if (e.code === 'Space') { e.preventDefault(); flash.flipped = !flash.flipped; render(); }
        if (e.key === 'ArrowRight') { e.preventDefault(); document.querySelector('[data-action="flash-rate"][data-rating="known"]')?.click(); }
        if (e.key === 'ArrowLeft')  { e.preventDefault(); document.querySelector('[data-action="flash-rate"][data-rating="review"]')?.click(); }
      }
    });

    render();

    /* ─── Auto-update notifier ────────────────────────────────────────
     * Fetches version.txt at boot (and on tab refocus) with cache: 'no-store'.
     * If the deployed value differs from the embedded APP_VERSION, the user
     * is on a stale cached page — show a friendly toast with a Reload button.
     * Designed for non-technical users so they never need to know what
     * "hard refresh" is. */
    let updateToastShown = false;

    function showUpdateToast(remoteVersion) {
      if (updateToastShown) return;
      updateToastShown = true;
      const toast = document.createElement('div');
      toast.id = 'updateToast';
      toast.setAttribute('role', 'status');
      toast.setAttribute('aria-live', 'polite');
      toast.innerHTML = `
        <span class="update-icon" aria-hidden="true"></span>
        <span class="update-text"><strong>New version available.</strong> Tap reload for the latest content.</span>
        <button class="update-reload" data-action="reload-app">Reload</button>
        <button class="update-dismiss" data-action="dismiss-update" aria-label="Dismiss">×</button>
      `;
      document.body.appendChild(toast);
      // Slide-in animation handled by CSS .is-visible class.
      requestAnimationFrame(() => toast.classList.add('is-visible'));
    }

    async function checkForUpdate() {
      try {
        const r = await fetch('version.txt?_=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) return;
        const remote = (await r.text()).trim();
        if (remote && remote !== APP_VERSION) showUpdateToast(remote);
      } catch (e) {
        // Offline or version.txt missing — silently skip. Don't show a toast.
      }
    }

    // Wire reload + dismiss buttons through existing click delegate? Simpler
    // to attach directly here so we don't pollute the main delegator.
    document.addEventListener('click', e => {
      const a = e.target.closest('[data-action]');
      if (!a) return;
      if (a.dataset.action === 'reload-app') {
        // Bypass cache by adding a query string the browser hasn't seen.
        const url = new URL(window.location.href);
        url.searchParams.set('_v', Date.now());
        window.location.replace(url.toString());
      }
      if (a.dataset.action === 'dismiss-update') {
        document.getElementById('updateToast')?.remove();
      }
    });

    // Initial check + recheck whenever the user returns to the tab.
    checkForUpdate();
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        // Stop speech when tab is hidden — don't talk to nobody.
        tts.stop();
      }
      if (!document.hidden && !updateToastShown) checkForUpdate();
    });

  </script>
</body>
</html>
